<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Staff Edition (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnrYNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "88114883918",
            appId: "1:88114883918:web:9dd831381ce90972d2a3c7",
            measurementId: "G-H8YCT6NRYV",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.studentsData = {};
        window.logsData = [];

        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            if (window.isAdminAuthenticated) updateUserTable();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            const val = snapshot.val();
            window.logsData = val ? Object.values(val) : [];
            if (window.isAdminAuthenticated) updateDashboard();
        });

        window.handleLog = () => {
            const idInput = document.getElementById('studentID');
            const id = idInput.value.trim();
            if(!id) return;

            const user = window.studentsData[id];
            if (!user) {
                document.getElementById('reg-id').value = id;
                document.getElementById('reg-modal').classList.remove('hidden');
                return;
            }

            const now = new Date();
            const logEntry = {
                id: id,
                name: user.name,
                role: user.role,
                course: user.course,
                timestamp: now.toLocaleTimeString(),
                date: now.toLocaleDateString(),
                day: now.toLocaleDateString('en-US', { weekday: 'short' })
            };

            push(ref(db, 'logs'), logEntry);
            showFeedback(user, logEntry.timestamp);
            idInput.value = "";
            idInput.focus();
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const fileInput = document.getElementById('reg-file');
            const processSave = (imgData) => {
                const newUser = {
                    name: document.getElementById('reg-name').value,
                    role: document.getElementById('reg-role').value,
                    sex: document.getElementById('reg-sex').value,
                    course: document.getElementById('reg-course').value,
                    year: document.getElementById('reg-year').value,
                    religion: document.getElementById('reg-religion').value,
                    photo: imgData || 'https://via.placeholder.com/150'
                };
                set(ref(db, 'students/' + id), newUser).then(() => {
                    document.getElementById('reg-modal').classList.add('hidden');
                    window.handleLog();
                });
            };
            if(fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => processSave(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else { processSave(); }
        };

        window.deleteStudent = (id) => { if (confirm(`Remove student ${id}?`)) remove(ref(db, 'students/' + id)); };
        
        window.updateUserAccount = () => {
            const id = document.getElementById('edit-id').value;
            const updatedData = {
                name: document.getElementById('edit-name').value,
                course: document.getElementById('edit-course').value,
                year: document.getElementById('edit-year').value
            };
            update(ref(db, 'students/' + id), updatedData).then(() => {
                document.getElementById('edit-modal').classList.add('hidden');
            });
        };

        window.exportData = () => {
            if(window.logsData.length === 0) return alert("No logs to export!");
            const ws = XLSX.utils.json_to_sheet(window.logsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "LibraryLogs");
            XLSX.writeFile(wb, "NEU_Library_Report.xlsx");
        };
    </script>

    <style>
        :root { --neu-green: #008000; --neu-red: #CC0000; }
        .bg-neu-green { background-color: var(--neu-green); }
        .text-neu-green { color: var(--neu-green); }
        .bg-neu-red { background-color: var(--neu-red); }
        .animate-pop { animation: fadeInScale 0.3s ease-out forwards; }
        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        
        /* Full Page Scroll behavior */
        html { scroll-behavior: smooth; }
        #main-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #008000; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #006400; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans flex flex-col">

    <nav class="bg-neu-green text-white py-6 px-8 shadow-2xl flex justify-between items-center sticky top-0 z-50 border-b-8 border-neu-red">
        <div class="flex items-center gap-6">
            <img src="download.png" class="h-16 w-16 bg-white rounded-full p-2 shadow-xl" onerror="this.src='https://via.placeholder.com/80'">
            <div>
                <h1 class="font-black text-xl md:text-2xl uppercase leading-none tracking-tighter">New Era University</h1>
                <p class="text-[10px] uppercase font-bold italic opacity-90 tracking-[0.2em] mt-1">Library Management System</p>
            </div>
        </div>
        <div id="liveClock" class="font-mono text-xs bg-black/30 px-4 py-2 rounded-xl hidden lg:block border border-white/10 shadow-inner"></div>
    </nav>

    <main class="container mx-auto p-4 md:p-8 flex flex-col items-center flex-grow">
        
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-neu-green p-8 md:p-12 text-center mb-10">
            
            <div id="attendance-view" class="space-y-8 animate-pop">
                <div class="space-y-2">
                    <h2 class="text-4xl font-black text-neu-green uppercase italic tracking-tighter">Type ID</h2>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Secure Student Access</p>
                </div>
                
                <div class="space-y-5">
                    <input type="text" id="studentID" autofocus placeholder="00-00000-000" 
                        class="w-full p-6 border-2 border-slate-100 rounded-3xl focus:border-green-600 outline-none text-center text-3xl font-mono uppercase shadow-inner bg-slate-50 transition-all">
                    <button onclick="handleLog()" class="w-full bg-neu-green hover:bg-green-800 text-white font-black py-6 rounded-3xl shadow-lg transition-all active:scale-95 text-2xl uppercase italic tracking-tight">
                        Time In
                    </button>
                </div>

                <div class="pt-8 border-t border-slate-50">
                    <button onclick="loginAdmin()" class="text-slate-300 hover:text-neu-green font-bold text-xs uppercase tracking-[0.2em] transition-colors">
                        🔒 Staff Login Portal
                    </button>
                </div>

                <div id="log-feedback" class="hidden mt-6 p-6 rounded-[2rem] bg-white border border-slate-100 animate-pop shadow-2xl">
                    <img id="fb-pic" src="" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-neu-green shadow-lg object-cover">
                    <h3 id="fb-name" class="text-2xl font-black text-slate-800 tracking-tight"></h3>
                    <p id="fb-role" class="text-neu-red font-bold text-xs uppercase mb-3"></p>
                    <div class="py-2 px-6 bg-neu-green text-white rounded-xl text-xs font-black inline-block shadow-md" id="fb-time"></div>
                </div>
            </div>

            <div id="admin-panel" class="hidden text-left animate-pop w-full space-y-10">
                <div class="flex justify-between items-center border-b pb-6 border-slate-100">
                    <div>
                        <h2 class="text-3xl font-black text-neu-green uppercase italic tracking-tighter leading-none">Staff Portal</h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Cloud Database Control</p>
                    </div>
                    <button onclick="logoutAdmin()" class="bg-neu-red hover:bg-red-700 text-white px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-wider transition-all shadow-lg">Logout</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 h-64 flex flex-col shadow-inner">
                        <span class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">Traffic Analytics</span>
                        <div class="flex-grow"><canvas id="trafficChart"></canvas></div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 flex flex-col shadow-inner">
                        <span class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">Recent Activity</span>
                        <table class="w-full text-[10px]">
                            <tbody id="recent-logs-list" class="divide-y divide-slate-200/50"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm">
                    <div class="bg-slate-50/90 backdrop-blur-sm px-6 py-4 border-b border-slate-100 flex justify-between items-center sticky top-[112px] z-30 rounded-t-[2rem]">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Database</span>
                        <input type="text" id="userSearchInput" onkeyup="filterUsers()" placeholder="Search Name/ID..." 
                               class="w-48 px-4 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-bold focus:outline-none focus:ring-2 focus:ring-green-500/20">
                    </div>
                    
                    <table class="w-full text-xs">
                        <thead class="bg-white sticky top-[168px] z-20 shadow-sm">
                            <tr class="text-[10px] font-black text-slate-300 uppercase text-left border-b">
                                <th class="p-6">Student Profile</th>
                                <th class="p-6 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-manage-list" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>

                <div class="pt-4 pb-6">
                    <button onclick="exportData()" class="w-full bg-neu-green hover:bg-green-800 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl transition-all">
                        Generate Cloud Report (Excel)
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-green-900/80 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full shadow-2xl border-t-8 border-neu-red animate-pop">
            <h2 class="text-2xl font-black text-neu-green mb-6 uppercase italic tracking-tighter">Registration</h2>
            <div class="space-y-3">
                <input type="text" id="reg-id" readonly class="w-full p-4 bg-slate-50 rounded-xl font-bold text-green-700 text-center">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 border border-slate-100 rounded-xl font-bold text-sm outline-none focus:border-neu-green">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-4 border border-slate-100 rounded-xl font-bold text-xs outline-none"><option>Student</option><option>Faculty</option></select>
                    <select id="reg-sex" class="p-4 border border-slate-100 rounded-xl font-bold text-xs outline-none"><option>Male</option><option>Female</option></select>
                </div>
                <input type="text" id="reg-course" placeholder="Course" class="w-full p-4 border border-slate-100 rounded-xl font-bold text-sm outline-none">
                <input type="text" id="reg-year" placeholder="Year Level" class="w-full p-4 border border-slate-100 rounded-xl font-bold text-sm outline-none">
                <input type="text" id="reg-religion" placeholder="Religion" class="w-full p-4 border border-slate-100 rounded-xl font-bold text-sm outline-none">
                <input type="file" id="reg-file" accept="image/*" class="w-full text-[10px] p-2 bg-slate-50 rounded-lg">
                <div class="flex gap-3 pt-4">
                    <button onclick="saveNewUser()" class="flex-1 bg-neu-green text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg">Save</button>
                    <button onclick="document.getElementById('reg-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-4 rounded-xl font-black uppercase text-xs text-slate-400">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-xs w-full animate-pop border-t-8 border-neu-green">
            <h2 class="text-xl font-black text-neu-green mb-4 uppercase italic">Edit User</h2>
            <div class="space-y-3">
                <input type="text" id="edit-id" readonly class="w-full p-4 bg-slate-50 rounded-xl font-bold text-slate-400 text-xs">
                <input type="text" id="edit-name" class="w-full p-4 border border-slate-100 rounded-xl font-bold text-xs outline-none">
                <input type="text" id="edit-course" class="w-full p-4 border border-slate-100 rounded-xl font-bold text-xs outline-none">
                <input type="text" id="edit-year" class="w-full p-4 border border-slate-100 rounded-xl font-bold text-xs outline-none">
                <div class="flex gap-2 pt-2">
                    <button onclick="updateUserAccount()" class="flex-1 bg-neu-green text-white py-4 rounded-xl font-black uppercase text-[10px] shadow-lg">Update</button>
                    <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-4 rounded-xl font-black uppercase text-[10px] text-slate-400">Back</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance;
        window.isAdminAuthenticated = false;
        const ADMIN_PASS = "1234";

        setInterval(() => { 
            const now = new Date(); 
            document.getElementById('liveClock').innerHTML = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) + ' | ' + now.toLocaleTimeString(); 
        }, 1000);

        function loginAdmin() {
            const pass = prompt("Enter Staff Password:");
            if (pass === ADMIN_PASS) {
                window.isAdminAuthenticated = true;
                const card = document.getElementById('main-card');
                card.classList.replace('max-w-xl', 'max-w-5xl');
                document.getElementById('attendance-view').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                if(!chartInstance) initChart();
                updateDashboard();
                updateUserTable();
            } else if (pass !== null) { alert("Access Denied!"); }
        }

        function logoutAdmin() { 
            window.isAdminAuthenticated = false; 
            const card = document.getElementById('main-card');
            card.classList.replace('max-w-5xl', 'max-w-xl');
            document.getElementById('admin-panel').classList.add('hidden'); 
            document.getElementById('attendance-view').classList.remove('hidden'); 
            window.scrollTo(0, 0); // Scroll back to top on logout
        }

        function filterUsers() {
            const filter = document.getElementById('userSearchInput').value.toLowerCase();
            const rows = document.getElementById('user-manage-list').getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].textContent || rows[i].innerText;
                rows[i].style.display = text.toLowerCase().includes(filter) ? "" : "none";
            }
        }

        function updateDashboard() {
            if(!window.logsData) return;
            const reversedLogs = [...window.logsData].reverse().slice(0, 15);
            document.getElementById('recent-logs-list').innerHTML = reversedLogs.map(l => `
                <tr class="border-b border-slate-50 hover:bg-white/50 transition-colors">
                    <td class="py-3 px-2"><b>${l.name}</b><br><span class="opacity-50 text-[8px] uppercase font-bold tracking-tighter">${l.course}</span></td>
                    <td class="py-3 px-2 text-right text-neu-green font-black">${l.timestamp}</td>
                </tr>
            `).join('');
            
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const counts = days.map(d => window.logsData.filter(l => l.day === d).length);
            if(chartInstance) { chartInstance.data.datasets[0].data = counts; chartInstance.update(); }
        }

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            const studentsArr = Object.entries(window.studentsData || {});
            list.innerHTML = studentsArr.map(([id, u]) => `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="p-6 flex items-center gap-4">
                        <img src="${u.photo}" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-md">
                        <div>
                            <b class="text-slate-800 text-sm">${u.name}</b>
                            <br><span class="text-[9px] font-mono font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-md uppercase tracking-tighter">${id} | ${u.course}</span>
                        </div>
                    </td>
                    <td class="p-6 text-center space-x-4">
                        <button onclick="openEditModal('${id}')" class="text-neu-green font-black text-[10px] uppercase hover:underline">Edit</button>
                        <button onclick="deleteStudent('${id}')" class="text-neu-red font-black text-[10px] uppercase hover:underline">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function openEditModal(id) {
            const u = window.studentsData[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = u.name;
            document.getElementById('edit-course').value = u.course;
            document.getElementById('edit-year').value = u.year;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function showFeedback(user, time) {
            const box = document.getElementById('log-feedback');
            document.getElementById('fb-name').innerText = user.name;
            document.getElementById('fb-role').innerText = `${user.role} | ${user.course}`;
            document.getElementById('fb-time').innerText = "✅ RECORDED: " + time;
            document.getElementById('fb-pic').src = user.photo;
            box.classList.remove('hidden'); 
            setTimeout(() => { box.classList.add('hidden'); }, 4000);
        }

        function initChart() {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            chartInstance = new Chart(ctx, { 
                type: 'bar', 
                data: { 
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'], 
                    datasets: [{ label: 'Students', data: [0,0,0,0,0,0], backgroundColor: '#008000', borderRadius: 8 }] 
                }, 
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } }, 
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } } 
                    } 
                } 
            });
        }
    </script>
</body>
</html>
