<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Staff Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // FIREBASE CONFIG FROM YOUR SCREENSHOT
        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnrYNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "88114883918",
            appId: "1:88114883918:web:9dd831381ce90972d2a3c7",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.studentsData = {};
        window.logsData = [];
        const ADMINS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];

        // Auth Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (ADMINS.includes(user.email)) {
                    enterAdminMode();
                } else {
                    alert("Logged in as: " + user.displayName);
                }
            }
        });

        // Firebase Listeners
        onValue(ref(db, 'students'), (snap) => window.studentsData = snap.val() || {});
        onValue(ref(db, 'logs'), (snap) => {
            const val = snap.val();
            window.logsData = val ? Object.values(val) : [];
            if (window.isAdminAuthenticated) updateDashboard();
        });

        // Functions
        window.login = () => signInWithPopup(auth, provider).catch(err => alert("Login Error: Check Support Email in Firebase Console."));
        window.logout = () => signOut(auth).then(() => location.reload());

        function enterAdminMode() {
            window.isAdminAuthenticated = true;
            document.getElementById('login-btn-nav').classList.add('hidden');
            document.getElementById('attendance-view').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('main-card').classList.replace('max-w-xl', 'max-w-6xl');
            updateDashboard();
        }

        window.handleLog = () => {
            const idInput = document.getElementById('studentID');
            const reason = document.getElementById('visitReason').value;
            const id = idInput.value.trim();
            if(!id) return;

            const user = window.studentsData[id];
            if (!user) {
                document.getElementById('reg-id').value = id;
                document.getElementById('reg-modal').classList.remove('hidden');
                return;
            }

            const now = new Date();
            const logEntry = {
                id, name: user.name, role: user.role, college: user.course, reason,
                isEmployee: user.role !== 'Student',
                timestamp: now.toLocaleTimeString(),
                date: now.toISOString().split('T')[0], 
                day: now.toLocaleDateString('en-US', { weekday: 'short' }),
                fullDate: now.toISOString()
            };

            push(ref(db, 'logs'), logEntry);
            showFeedback(user);
            idInput.value = "";
        };

        window.updateDashboard = () => {
            const fReason = document.getElementById('filterReason').value;
            const fCollege = document.getElementById('filterCollege').value;
            const fType = document.getElementById('filterUserType').value;
            const sDate = document.getElementById('startDate').value;
            const eDate = document.getElementById('endDate').value;

            let filtered = window.logsData.filter(log => {
                const matchReason = !fReason || log.reason === fReason;
                const matchCollege = !fCollege || log.college === fCollege;
                const matchType = !fType || (fType === 'employee' ? log.isEmployee : !log.isEmployee);
                const matchDate = (!sDate || log.date >= sDate) && (!eDate || log.date <= eDate);
                return matchReason && matchCollege && matchType && matchDate;
            });

            // Update Dashboard Cards
            document.getElementById('card-total').innerText = filtered.length;
            document.getElementById('card-employee').innerText = filtered.filter(l => l.isEmployee).length;
            
            const collegeCounts = filtered.reduce((acc, curr) => {
                acc[curr.college] = (acc[curr.college] || 0) + 1;
                return acc;
            }, {});
            const topCollege = Object.entries(collegeCounts).sort((a,b) => b[1]-a[1])[0];
            document.getElementById('card-top-college').innerText = topCollege ? topCollege[0] : 'N/A';

            // Table Update
            const list = document.getElementById('recent-logs-list');
            list.innerHTML = [...filtered].reverse().slice(0, 15).map(l => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-3 text-sm font-bold">${l.name}</td>
                    <td class="p-3 text-xs text-slate-500">${l.college}</td>
                    <td class="p-3 text-xs font-semibold text-slate-600">${l.reason}</td>
                    <td class="p-3 text-right font-black text-neu-green">${l.timestamp}</td>
                </tr>
            `).join('');
        };
        
        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const newUser = {
                name: document.getElementById('reg-name').value,
                role: document.getElementById('reg-role').value,
                sex: document.getElementById('reg-sex').value,
                course: document.getElementById('reg-college').value, 
                year: document.getElementById('reg-year').value,
                religion: document.getElementById('reg-religion').value,
                photo: 'https://via.placeholder.com/150'
            };
            set(ref(db, 'students/' + id), newUser).then(() => {
                document.getElementById('reg-modal').classList.add('hidden');
                window.handleLog();
            });
        };

        function showFeedback(user) {
            const box = document.getElementById('log-feedback');
            document.getElementById('fb-name').innerText = user.name;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 3000);
        }
    </script>
    <style>
        :root { --neu-green: #008000; --neu-red: #CC0000; }
        .bg-neu-green { background-color: var(--neu-green); }
        .text-neu-green { color: var(--neu-green); }
        .bg-neu-red { background-color: var(--neu-red); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans">

    <nav class="bg-neu-green text-white py-4 px-8 shadow-xl flex justify-between items-center border-b-4 border-neu-red">
        <div class="flex items-center gap-4">
            <img src="download.png" class="h-12 w-12 bg-white rounded-full p-1 shadow-md" onerror="this.src='https://via.placeholder.com/50'">
            <div>
                <h1 class="font-black text-xl uppercase tracking-tighter">NEU Library System</h1>
                <p class="text-[8px] font-bold uppercase tracking-widest opacity-80">Staff Edition</p>
            </div>
        </div>
        <button id="login-btn-nav" onclick="login()" class="bg-white text-neu-green px-6 py-2 rounded-xl font-black text-xs shadow hover:bg-slate-100 transition uppercase italic">
            Staff Login
        </button>
    </nav>

    <main class="container mx-auto p-6 flex-grow flex flex-col items-center justify-center">
        
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl p-10 text-center transition-all duration-500">
            
            <div id="attendance-view" class="space-y-6">
                <h2 class="text-5xl font-black text-neu-green italic uppercase tracking-tighter">Time In</h2>
                <div class="space-y-4 text-left">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 italic">Purpose of Visit</label>
                    <select id="visitReason" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold outline-none focus:border-neu-green">
                        <option>Study / Reading</option>
                        <option>Research</option>
                        <option>Borrow / Return Books</option>
                        <option>Computer and Internet</option>
                        <option>Clearance</option>
                    </select>
                    <input type="text" id="studentID" placeholder="ENTER ID NUMBER" class="w-full p-6 border-2 rounded-[2rem] text-center text-3xl font-mono uppercase bg-slate-50 focus:border-neu-green outline-none shadow-inner">
                    <button onclick="handleLog()" class="w-full bg-neu-green text-white font-black py-6 rounded-[2rem] text-2xl shadow-lg active:scale-95 transition uppercase italic">Confirm Attendance</button>
                </div>
                <div id="log-feedback" class="hidden p-4 bg-green-50 border border-green-200 rounded-2xl animate-bounce">
                    <p id="fb-name" class="font-black text-neu-green"></p>
                    <p class="text-xs text-slate-500 uppercase">Successfully Logged In</p>
                </div>
            </div>

            <div id="admin-panel" class="hidden text-left space-y-6 w-full">
                <div class="flex justify-between items-center border-b pb-4">
                    <h2 class="text-3xl font-black text-neu-green italic">ADMIN DASHBOARD</h2>
                    <button onclick="logout()" class="text-neu-red font-bold uppercase text-xs border-2 border-neu-red px-6 py-2 rounded-xl hover:bg-red-50 transition">Logout</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-green-50 p-6 rounded-3xl border border-green-100 shadow-sm">
                        <p class="text-[10px] font-black text-green-600 uppercase tracking-widest">Total Visitors</p>
                        <p id="card-total" class="text-4xl font-black text-neu-green">0</p>
                    </div>
                    <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100 shadow-sm">
                        <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Employees Today</p>
                        <p id="card-employee" class="text-4xl font-black text-blue-700">0</p>
                    </div>
                    <div class="bg-red-50 p-6 rounded-3xl border border-red-100 shadow-sm">
                        <p class="text-[10px] font-black text-red-600 uppercase tracking-widest">Top College</p>
                        <p id="card-top-college" class="text-xl font-black text-neu-red truncate">N/A</p>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 rounded-3xl grid grid-cols-2 md:grid-cols-5 gap-3 border shadow-inner">
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Start Date</label>
                        <input type="date" id="startDate" onchange="updateDashboard()" class="p-2 rounded-lg border text-[10px] font-bold outline-none">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">End Date</label>
                        <input type="date" id="endDate" onchange="updateDashboard()" class="p-2 rounded-lg border text-[10px] font-bold outline-none">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">College</label>
                        <select id="filterCollege" onchange="updateDashboard()" class="p-2 rounded-lg border text-[10px] font-bold outline-none">
                            <option value="">All Colleges</option>
                            <option>Informatics and Computing Studies</option>
                            <option>Accountancy</option>
                            <option>Arts and Science</option>
                            <option>Business Administration</option>
                            <option>Engineering and Architecture</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Reason</label>
                        <select id="filterReason" onchange="updateDashboard()" class="p-2 rounded-lg border text-[10px] font-bold outline-none">
                            <option value="">All Reasons</option>
                            <option>Study / Reading</option><option>Research</option>
                            <option>Borrow / Return Books</option><option>Computer and Internet</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">User Type</label>
                        <select id="filterUserType" onchange="updateDashboard()" class="p-2 rounded-lg border text-[10px] font-bold outline-none">
                            <option value="">All Users</option>
                            <option value="student">Students</option><option value="employee">Employees</option>
                        </select>
                    </div>
                </div>

                <div class="bg-white border rounded-3xl shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-3 text-[10px] font-black uppercase text-slate-400">Name</th>
                                <th class="p-3 text-[10px] font-black uppercase text-slate-400">College</th>
                                <th class="p-3 text-[10px] font-black uppercase text-slate-400">Reason</th>
                                <th class="p-3 text-right text-[10px] font-black uppercase text-slate-400">Time</th>
                            </tr>
                        </thead>
                        <tbody id="recent-logs-list" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl border-t-8 border-neu-red">
            <h3 class="text-2xl font-black text-neu-green mb-4 uppercase italic">New Visitor Profile</h3>
            <div class="space-y-3">
                <input type="text" id="reg-id" readonly class="w-full p-4 bg-slate-100 rounded-xl font-bold text-center text-neu-green">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 border rounded-xl font-bold outline-none focus:border-neu-green">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-4 border rounded-xl font-bold text-sm outline-none"><option>Student</option><option>Faculty</option><option>Staff</option></select>
                    <select id="reg-sex" class="p-4 border rounded-xl font-bold text-sm outline-none"><option>Male</option><option>Female</option></select>
                </div>
                <select id="reg-college" class="w-full p-4 border rounded-xl font-bold text-sm outline-none">
                    <option>Informatics and Computing Studies</option>
                    <option>Accountancy</option>
                    <option>Arts and Science</option>
                    <option>Business Administration</option>
                    <option>Education</option>
                    <option>Engineering and Architecture</option>
                </select>
                <input type="text" id="reg-year" placeholder="Year Level (e.g. 1st Year)" class="w-full p-4 border rounded-xl font-bold outline-none">
                <input type="text" id="reg-religion" placeholder="Religion" class="w-full p-4 border rounded-xl font-bold outline-none">
                <button onclick="saveNewUser()" class="w-full bg-neu-green text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-green-800 transition uppercase italic">Register & Time In</button>
                <button onclick="document.getElementById('reg-modal').classList.add('hidden')" class="w-full text-slate-400 font-bold text-xs uppercase tracking-widest mt-2">Cancel</button>
            </div>
        </div>
    </div>

</body>
</html>
