<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnRyNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "80114803910",
            appId: "1:80114803910:web:9dd831301ce90972d2a3c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        const ADMIN_EMAILS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];
        window.studentsData = {};
        window.logsData = {};

        // Authentication State
        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('admin-display-name').innerText = "Admin: " + user.email;
                showAdminPanel();
            } else {
                hideAdminPanel();
            }
        });

        // Data Syncing
        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            updateUserTable();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            window.logsData = snapshot.val() || {};
            updateStatsAndLogs();
        });

        // TIME IN FUNCTION
        window.handleLog = async () => {
            const id = document.getElementById('studentID').value.trim();
            const reason = document.getElementById('visitReason').value;
            const user = window.studentsData[id];

            if (!user) {
                document.getElementById('profile-not-found').classList.remove('hidden');
                return;
            }
            if (user.isBlocked) return alert("ACCOUNT BLOCKED.");

            const now = new Date();
            const logKey = push(ref(db, 'logs')).key;
            await set(ref(db, 'logs/' + logKey), {
                id, name: user.name, role: user.role, college: user.college, reason,
                date: now.toLocaleDateString('en-CA'), timestamp: now.toISOString()
            });

            document.getElementById('log-form-container').classList.add('hidden');
            document.getElementById('welcome-msg').classList.remove('hidden');
            setTimeout(() => location.reload(), 2000);
        };

        // ADMIN FUNCTIONS
        window.deleteLog = (key) => { if(confirm("Delete log?")) remove(ref(db, 'logs/' + key)); };
        window.toggleBlock = (id, status) => update(ref(db, 'students/' + id), { isBlocked: !status });
        window.exportToExcel = () => {
            const data = Object.values(window.logsData);
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Logs");
            XLSX.writeFile(wb, "Library_Logs.xlsx");
        };

        function updateStatsAndLogs() {
            const logEntries = Object.entries(window.logsData).map(([key, data]) => ({ firebaseKey: key, ...data }));
            const search = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = logEntries.filter(l => l.id.includes(search) || l.name.toLowerCase().includes(search));

            document.getElementById('stat-total').innerText = filtered.length;
            const logList = document.getElementById('log-history-list');
            logList.innerHTML = "";
            filtered.reverse().forEach((log) => {
                const dt = new Date(log.timestamp);
                const timeStr = dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                logList.innerHTML += `<tr class="border-b text-[10px]"><td class="p-2">${timeStr}</td><td class="p-2 font-bold">${log.name}</td><td class="p-2">${log.reason}</td><td class="p-2 text-center text-red-500 font-bold cursor-pointer" onclick="deleteLog('${log.firebaseKey}')">×</td></tr>`;
            });
        }

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            list.innerHTML = "";
            Object.entries(window.studentsData).forEach(([id, data]) => {
                list.innerHTML += `<tr class="border-b text-[10px]"><td class="p-2">${id}</td><td class="p-2 font-bold uppercase text-green-700">${data.name}</td><td class="p-2">${data.role}</td><td class="p-2 text-red-600 underline cursor-pointer" onclick="toggleBlock('${id}', ${data.isBlocked})">${data.isBlocked ? 'Unblock' : 'Block'}</td></tr>`;
            });
        }

        const showAdminPanel = () => { document.getElementById('main-card').classList.replace('max-w-xl', 'max-w-6xl'); document.getElementById('attendance-view').classList.add('hidden'); document.getElementById('admin-panel').classList.remove('hidden'); };
        const hideAdminPanel = () => { document.getElementById('main-card').classList.replace('max-w-6xl', 'max-w-xl'); document.getElementById('admin-panel').classList.add('hidden'); document.getElementById('attendance-view').classList.remove('hidden'); };
        window.loginAdmin = () => signInWithPopup(auth, provider);
        window.logoutAdmin = () => signOut(auth).then(() => location.reload());
        
        window.startRegistration = async () => {
            const result = await signInWithPopup(auth, provider);
            document.getElementById('reg-id').value = document.getElementById('studentID').value;
            document.getElementById('reg-email').value = result.user.email;
            document.getElementById('reg-modal').classList.remove('hidden');
        };

        window.saveUser = () => {
            const id = document.getElementById('reg-id').value;
            set(ref(db, 'students/' + id), {
                name: document.getElementById('reg-name').value.trim(),
                role: document.getElementById('reg-role').value,
                college: document.getElementById('reg-college').value,
                year: document.getElementById('reg-year').value,
                googleEmail: document.getElementById('reg-email').value,
                isBlocked: false
            }).then(() => location.reload());
        };
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans">
    <nav class="bg-[#008000] text-white py-4 px-8 shadow-xl flex justify-between items-center border-b-8 border-[#CC0000]">
        <h1 class="font-black text-lg uppercase italic">NEU Library System</h1>
        <div id="admin-display-name" class="text-[10px] opacity-70"></div>
    </nav>

    <main class="container mx-auto p-4 flex flex-col items-center justify-center flex-grow">
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-[#008000] p-8 transition-all">
            
            <div id="attendance-view" class="text-center space-y-6">
                <div id="welcome-msg" class="hidden py-10"><h2 class="text-4xl font-black text-[#008000] italic">Welcome!</h2></div>
                <div id="log-form-container" class="space-y-4">
                    <h2 class="text-3xl font-black text-[#008000] uppercase italic">Time In</h2>
                    <select id="visitReason" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                        <option>Reading</option><option>Research</option><option>Computer Use</option>
                    </select>
                    <input type="text" id="studentID" placeholder="Student ID" class="w-full p-6 border rounded-[2rem] text-center text-3xl font-mono uppercase bg-slate-50">
                    <button onclick="handleLog()" class="w-full bg-[#008000] text-white font-black py-5 rounded-[2rem] text-xl shadow-lg">Confirm</button>
                    <div id="profile-not-found" class="hidden text-red-600 text-[10px] font-bold">No Profile. <span class="underline cursor-pointer" onclick="startRegistration()">Register Here</span></div>
                    <button onclick="loginAdmin()" class="text-[10px] text-slate-300 uppercase mt-4 block mx-auto">🔒 Admin</button>
                </div>
            </div>

            <div id="admin-panel" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-black text-[#008000] italic">ADMIN PORTAL</h2>
                    <div class="flex gap-2">
                        <button onclick="exportToExcel()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">EXPORT</button>
                        <button onclick="logoutAdmin()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">LOGOUT</button>
                    </div>
                </div>
                <input type="text" id="adminSearch" onkeyup="updateStatsAndLogs()" placeholder="Search..." class="w-full p-3 border rounded-xl font-bold text-sm">
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-green-700 text-white p-4 rounded-2xl text-center"><p class="text-[8px] font-black">VISITORS</p><h3 id="stat-total" class="text-2xl font-black">0</h3></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white border rounded-2xl overflow-hidden shadow-sm">
                        <div class="bg-slate-50 p-2 text-[9px] font-black text-center">USER LIST</div>
                        <div class="max-h-60 overflow-y-auto"><table class="w-full text-left"><tbody id="user-manage-list"></tbody></table></div>
                    </div>
                    <div class="bg-white border rounded-2xl overflow-hidden shadow-sm">
                        <div class="bg-slate-50 p-2 text-[9px] font-black text-center">LOGS</div>
                        <div class="max-h-60 overflow-y-auto"><table class="w-full text-left"><tbody id="log-history-list"></tbody></table></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-[3rem] p-8 max-w-md w-full border-t-8 border-red-600 shadow-2xl">
            <h2 class="text-2xl font-black text-[#008000] text-center mb-4 italic">REGISTER</h2>
            <div class="space-y-3">
                <input type="text" id="reg-id" readonly class="w-full p-3 bg-slate-100 rounded-xl text-center font-bold">
                <input type="text" id="reg-email" readonly class="w-full p-2 text-[10px] text-center opacity-50">
                <input type="text" id="reg-name" placeholder="FULL NAME (LAST, FIRST)" class="w-full p-4 border rounded-xl font-bold uppercase">
                <select id="reg-role" class="w-full p-3 border rounded-xl font-bold"><option>Student</option><option>Teacher</option></select>
                <select id="reg-year" class="w-full p-3 border rounded-xl font-bold"><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>N/A</option></select>
                <select id="reg-college" class="w-full p-3 border rounded-xl font-bold"><option>CICS</option><option>CAS</option><option>CEA</option><option>CBA</option></select>
                <button onclick="saveUser()" class="w-full bg-[#008000] text-white py-4 rounded-xl font-black uppercase shadow-lg">Register</button>
            </div>
        </div>
    </div>
</body>
</html>
