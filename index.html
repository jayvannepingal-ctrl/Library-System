<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Staff Edition (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnrYNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "88114883918",
            appId: "1:88114883918:web:9dd831381ce90972d2a3c7",
            measurementId: "G-H8YCT6NRYV",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.studentsData = {};
        window.logsData = [];

        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            if (window.isAdminAuthenticated) updateUserTable();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            const val = snapshot.val();
            window.logsData = val ? Object.values(val) : [];
            if (window.isAdminAuthenticated) updateDashboard();
        });

        window.handleLog = () => {
            const idInput = document.getElementById('studentID');
            const id = idInput.value.trim();
            if(!id) return;

            const user = window.studentsData[id];
            if (!user) {
                document.getElementById('reg-id').value = id;
                document.getElementById('reg-modal').classList.remove('hidden');
                return;
            }

            const now = new Date();
            const logEntry = {
                id: id,
                name: user.name,
                role: user.role,
                course: user.course,
                timestamp: now.toLocaleTimeString(),
                date: now.toLocaleDateString(),
                day: now.toLocaleDateString('en-US', { weekday: 'short' })
            };

            push(ref(db, 'logs'), logEntry);
            showFeedback(user, logEntry.timestamp);
            idInput.value = "";
            idInput.focus();
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const fileInput = document.getElementById('reg-file');
            const processSave = (imgData) => {
                const newUser = {
                    name: document.getElementById('reg-name').value,
                    role: document.getElementById('reg-role').value,
                    sex: document.getElementById('reg-sex').value,
                    course: document.getElementById('reg-course').value,
                    year: document.getElementById('reg-year').value,
                    religion: document.getElementById('reg-religion').value,
                    photo: imgData || 'https://via.placeholder.com/150'
                };
                set(ref(db, 'students/' + id), newUser).then(() => {
                    document.getElementById('reg-modal').classList.add('hidden');
                    window.handleLog();
                });
            };
            if(fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => processSave(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else { processSave(); }
        };

        window.deleteStudent = (id) => { if (confirm(`Remove student ${id}?`)) remove(ref(db, 'students/' + id)); };

        window.updateUserAccount = () => {
            const id = document.getElementById('edit-id').value;
            const updatedData = {
                name: document.getElementById('edit-name').value,
                role: document.getElementById('edit-role').value,
                course: document.getElementById('edit-course').value,
                year: document.getElementById('edit-year').value,
                religion: document.getElementById('edit-religion').value
            };
            update(ref(db, 'students/' + id), updatedData).then(() => {
                document.getElementById('edit-modal').classList.add('hidden');
            });
        };

        window.exportData = () => {
            if(window.logsData.length === 0) return alert("No logs to export!");
            const ws = XLSX.utils.json_to_sheet(window.logsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "LibraryLogs");
            XLSX.writeFile(wb, "NEU_Cloud_Report.xlsx");
        };
    </script>

    <style>
        :root { --neu-green: #008000; --neu-red: #CC0000; }
        .bg-neu-green { background-color: var(--neu-green); }
        .text-neu-green { color: var(--neu-green); }
        .bg-neu-red { background-color: var(--neu-red); }
        .animate-pop { animation: fadeInScale 0.2s ease-out forwards; }
        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <nav class="bg-neu-green text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-40 border-b-4 border-neu-red">
        <div class="flex items-center gap-3">
            <img src="download.png" class="h-10 w-10 bg-white rounded-full p-1">
            <div>
                <h1 class="font-black text-sm md:text-lg uppercase">New Era University</h1>
                <p class="text-[10px] uppercase font-bold italic opacity-90">Library System | Cloud</p>
            </div>
        </div>
        <div id="liveClock" class="font-mono text-xs hidden sm:block"></div>
    </nav>

    <main class="container mx-auto p-6 flex flex-col items-center justify-center flex-grow">
        
        <div class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-neu-green p-10 text-center relative overflow-hidden">
            
            <div id="attendance-view" class="space-y-6">
                <h2 class="text-3xl font-black text-neu-green uppercase italic tracking-tighter">Enter Student ID</h2>
                
                <div class="space-y-4">
                    <input type="text" id="studentID" autofocus placeholder="00-00000-000" 
                        class="w-full p-5 border-2 border-slate-200 rounded-3xl focus:border-green-600 outline-none text-center text-3xl font-mono uppercase shadow-inner">
                    <button onclick="handleLog()" class="w-full bg-neu-green hover:bg-green-800 text-white font-black py-5 rounded-3xl shadow-lg transition-all active:scale-95 text-xl">
                        TIME IN
                    </button>
                </div>

                <div class="pt-4">
                    <button onclick="loginAdmin()" class="text-slate-400 hover:text-neu-green font-bold text-xs uppercase tracking-widest transition">
                        🔒 Login as Staff
                    </button>
                </div>

                <div id="log-feedback" class="hidden mt-6 p-6 rounded-[2rem] bg-green-50 border-2 border-green-100 animate-pop shadow-inner">
                    <img id="fb-pic" src="" class="w-24 h-24 rounded-full mx-auto mb-3 border-4 border-white shadow-md object-cover">
                    <h3 id="fb-name" class="text-xl font-black text-slate-800 leading-tight"></h3>
                    <p id="fb-role" class="text-neu-red font-bold text-[10px] uppercase"></p>
                    <div class="mt-3 py-2 px-4 bg-neu-green text-white rounded-xl text-xs font-mono inline-block shadow-sm" id="fb-time"></div>
                </div>
            </div>

            <div id="admin-panel" class="hidden text-left animate-pop">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black text-neu-green uppercase italic">Staff Portal</h2>
                    <button onclick="logoutAdmin()" class="bg-neu-red text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase">Logout</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="bg-slate-50 p-4 rounded-2xl border h-40 flex flex-col">
                        <span class="text-[9px] font-black text-slate-400 uppercase mb-2">Weekly Traffic</span>
                        <canvas id="trafficChart"></canvas>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border h-40 flex flex-col overflow-hidden">
                        <span class="text-[9px] font-black text-slate-400 uppercase mb-2">Recent Logs</span>
                        <div class="overflow-y-auto custom-scrollbar flex-grow text-[10px]">
                            <table class="w-full"><tbody id="recent-logs-list"></tbody></table>
                        </div>
                    </div>
                </div>

                <div class="max-h-60 overflow-y-auto border rounded-2xl custom-scrollbar">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-100 sticky top-0">
                            <tr><th class="p-2 text-left">User</th><th class="p-2 text-center">Action</th></tr>
                        </thead>
                        <tbody id="user-manage-list"></tbody>
                    </table>
                </div>
                <button onclick="exportData()" class="w-full mt-4 bg-green-600 text-white py-3 rounded-2xl font-bold text-xs uppercase shadow-md">Export Report (Excel)</button>
            </div>
        </div>

    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-green-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl border-t-8 border-neu-red">
            <h2 class="text-2xl font-black text-neu-green mb-4 uppercase">New Registration</h2>
            <div class="space-y-3">
                <input type="text" id="reg-id" readonly class="w-full p-3 bg-slate-50 rounded-xl font-bold text-green-700">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-3 border rounded-xl font-semibold">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-3 border rounded-xl font-semibold"><option>Student</option><option>Faculty</option></select>
                    <select id="reg-sex" class="p-3 border rounded-xl font-semibold"><option>Male</option><option>Female</option></select>
                </div>
                <input type="text" id="reg-course" placeholder="Course" class="w-full p-3 border rounded-xl font-semibold">
                <input type="text" id="reg-year" placeholder="Year" class="w-full p-3 border rounded-xl font-semibold">
                <input type="text" id="reg-religion" placeholder="Religion" class="w-full p-3 border rounded-xl font-semibold">
                <input type="file" id="reg-file" accept="image/*" class="w-full text-[10px]">
                <div class="flex gap-2 pt-2">
                    <button onclick="saveNewUser()" class="flex-1 bg-neu-green text-white py-3 rounded-xl font-black">SAVE</button>
                    <button onclick="document.getElementById('reg-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-3 rounded-xl font-black">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full">
            <h2 class="text-xl font-black text-neu-green mb-4 uppercase">Edit User</h2>
            <div class="space-y-3">
                <input type="text" id="edit-id" readonly class="w-full p-3 bg-slate-50 rounded-xl font-bold">
                <input type="text" id="edit-name" class="w-full p-3 border rounded-xl font-bold">
                <input type="text" id="edit-course" placeholder="Course" class="w-full p-3 border rounded-xl font-bold">
                <input type="text" id="edit-year" placeholder="Year" class="w-full p-3 border rounded-xl font-bold">
                <div class="flex gap-2 pt-4">
                    <button onclick="updateUserAccount()" class="flex-1 bg-neu-green text-white py-3 rounded-xl font-black">SAVE</button>
                    <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-3 rounded-xl font-black">BACK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance;
        window.isAdminAuthenticated = false;
        const ADMIN_PASS = "1234";

        setInterval(() => { 
            const now = new Date(); 
            document.getElementById('liveClock').innerHTML = now.toLocaleDateString() + ' | ' + now.toLocaleTimeString(); 
        }, 1000);

        function loginAdmin() {
            const pass = prompt("Enter Staff Password:");
            if (pass === ADMIN_PASS) {
                window.isAdminAuthenticated = true;
                document.getElementById('attendance-view').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                if(!chartInstance) initChart();
                updateDashboard();
                updateUserTable();
            } else if (pass !== null) { alert("Access Denied!"); }
        }

        function logoutAdmin() { 
            window.isAdminAuthenticated = false; 
            document.getElementById('attendance-view').classList.remove('hidden'); 
            document.getElementById('admin-panel').classList.add('hidden'); 
        }

        function updateDashboard() {
            if(!window.logsData) return;
            const logs = [...window.logsData].reverse().slice(0, 20);
            document.getElementById('recent-logs-list').innerHTML = logs.map(l => `
                <tr class="border-b border-slate-100">
                    <td class="py-1"><b>${l.name}</b><br><span class="opacity-50 text-[8px]">${l.course}</span></td>
                    <td class="py-1 text-right text-neu-green font-bold">${l.timestamp}</td>
                </tr>
            `).join('');
            
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const counts = days.map(d => window.logsData.filter(l => l.day === d).length);
            if(chartInstance) { chartInstance.data.datasets[0].data = counts; chartInstance.update(); }
        }

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            const studentsArr = Object.entries(window.studentsData || {});
            list.innerHTML = studentsArr.map(([id, u]) => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-2 flex items-center gap-2">
                        <img src="${u.photo}" class="w-6 h-6 rounded-full object-cover">
                        <div><b>${u.name}</b><br><span class="text-[9px] font-mono">${id}</span></div>
                    </td>
                    <td class="p-2 text-center">
                        <button onclick="openEditModal('${id}')" class="text-green-600 font-bold mr-2">Edit</button>
                        <button onclick="deleteStudent('${id}')" class="text-red-500 font-bold">Del</button>
                    </td>
                </tr>
            `).join('');
        }

        function openEditModal(id) {
            const u = window.studentsData[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = u.name;
            document.getElementById('edit-course').value = u.course;
            document.getElementById('edit-year').value = u.year;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function showFeedback(user, time) {
            const box = document.getElementById('log-feedback');
            document.getElementById('fb-name').innerText = user.name;
            document.getElementById('fb-role').innerText = user.role + " | " + user.course;
            document.getElementById('fb-time').innerText = "✅ TIME IN: " + time;
            document.getElementById('fb-pic').src = user.photo;
            box.classList.remove('hidden'); 
            setTimeout(() => { box.classList.add('hidden'); }, 3500);
        }

        function initChart() {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            chartInstance = new Chart(ctx, { 
                type: 'bar', 
                data: { 
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'], 
                    datasets: [{ label: 'Entries', data: [0,0,0,0,0,0], backgroundColor: '#008000', borderRadius: 5 }] 
                }, 
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } 
            });
        }
    </script>
</body>
</html>
