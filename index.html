<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Enhanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .neu-gradient { background: linear-gradient(135deg, #008000 0%, #006400 100%); }
        /* Custom scrollbar para sa tables */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #008000; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="neu-gradient text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-white p-1 rounded-full">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c8/New_Era_University_logo.png/220px-New_Era_University_logo.png" alt="NEU Logo" class="w-10 h-10">
            </div>
            <h1 class="font-black italic tracking-tighter text-xl">NEU LIBRARY SYSTEM</h1>
        </div>
        <div id="admin-display-name" class="text-[10px] font-bold opacity-80"></div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div id="main-card" class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-8 transition-all duration-500 border-t-8 border-[#008000]">
            
            <div id="attendance-view" class="space-y-6">
                <div id="log-form-container" class="space-y-6">
                    <div class="text-center">
                        <h2 class="text-4xl font-black text-[#008000] italic uppercase tracking-widest">Time In</h2>
                    </div>
                    
                    <div class="space-y-4">
                        <select id="visitReason" class="w-full p-4 border-2 rounded-2xl font-bold text-slate-700 focus:border-[#008000] outline-none appearance-none bg-slate-50">
                            <option>Reading</option>
                            <option>Research</option>
                            <option>Computer Use</option>
                            <option>Assignments</option>
                            <option>Books/Borrowing</option>
                        </select>
                        <input type="text" id="studentID" placeholder="00-00000-000" class="w-full p-5 border-2 rounded-2xl text-center text-2xl font-black tracking-widest focus:border-[#008000] outline-none">
                        <button onclick="handleLog()" class="w-full neu-gradient text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all">TIME IN</button>
                    </div>

                    <div id="profile-not-found" class="hidden text-center p-4 bg-orange-50 rounded-2xl border-2 border-orange-200">
                        <p class="font-bold text-orange-700 mb-2">Student ID not found in the system.</p>
                        <button onclick="startRegistration()" class="text-sm font-black text-[#008000] underline uppercase tracking-tighter">Register with Google</button>
                    </div>

                    <div class="text-center pt-4">
                        <button onclick="loginAdmin()" class="text-[10px] font-bold text-slate-400 hover:text-[#008000] transition-colors uppercase flex items-center justify-center gap-1 mx-auto">
                            👤 Admin Access
                        </button>
                    </div>
                </div>

                <div id="welcome-msg" class="hidden text-center animate-bounce"></div>
            </div>

            <div id="admin-panel" class="hidden space-y-6 w-full">
                <div class="flex justify-between items-center border-b pb-4">
                    <h2 class="text-2xl font-black text-[#008000] uppercase italic">Admin Dashboard</h2>
                    <button onclick="logoutAdmin()" class="bg-[#CC0000] text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md hover:bg-red-700 transition-colors">LOGOUT</button>
                </div>

                <div class="bg-slate-50 p-4 rounded-[2rem] border-2 space-y-3 shadow-inner">
                    <input type="text" id="adminSearch" onkeyup="applyFilters()" placeholder="Search Name, ID, or Email..." class="w-full p-3 border-2 rounded-xl font-bold focus:border-green-500 outline-none">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                        <input type="date" id="filterDate" onchange="applyFilters()" class="p-2 border rounded-lg text-[10px] font-bold">
                        <select id="filterCol" onchange="applyFilters()" class="p-2 border rounded-lg text-[10px] font-bold">
                            <option>All Colleges</option>
                            <option>Integrated School (IS)</option>
                            <option>CICS</option><option>CEA</option><option>CAS</option>
                            <option>COA</option><option>CAG</option><option>CBA</option>
                            <option>COC</option><option>CCR</option><option>CED</option>
                            <option>CMT</option><option>CMW</option><option>COM</option>
                            <option>CON</option><option>CPT</option><option>CRT</option>
                            <option>SOIR</option>
                        </select>
                        <select id="filterReason" onchange="applyFilters()" class="p-2 border rounded-lg text-[10px] font-bold">
                            <option>All Reasons</option><option>Reading</option><option>Research</option><option>Computer Use</option><option>Assignments</option><option>Books/Borrowing</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-[#008000] text-white p-4 rounded-2xl text-center shadow-lg"><p class="text-[10px] font-bold opacity-70 uppercase">Total Visits</p><h3 id="stat-total" class="text-2xl font-black">0</h3></div>
                    <div class="bg-white border-2 p-4 rounded-2xl text-center shadow-md"><p class="text-[10px] font-bold text-slate-400 uppercase">Students</p><h3 id="stat-student" class="text-2xl font-black text-[#008000]">0</h3></div>
                    <div class="bg-white border-2 p-4 rounded-2xl text-center shadow-md"><p class="text-[10px] font-bold text-slate-400 uppercase">Faculty</p><h3 id="stat-staff" class="text-2xl font-black text-[#CC0000]">0</h3></div>
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <div class="bg-white border-2 rounded-2xl overflow-hidden shadow-sm">
                        <div class="bg-slate-100 p-2 text-[10px] font-black uppercase text-slate-500 border-b">User Management</div>
                        <div class="overflow-x-auto max-h-80 custom-scroll">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 text-[10px] uppercase sticky top-0 z-10 border-b">
                                    <tr>
                                        <th class="p-3 text-center">Pic</th>
                                        <th class="p
