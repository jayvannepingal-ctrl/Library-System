<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnRyNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "80114803910",
            appId: "1:80114803910:web:9dd831301ce90972d2a3c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();
        
        const ADMIN_EMAILS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];
        window.studentsData = {};
        window.editingId = null;

        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                showAdminPanel();
            } else {
                hideAdminPanel();
            }
        });

        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            updateUserTable();
        });

        // ADMIN EDIT PROFILE
        window.editUser = (id) => {
            const user = window.studentsData[id];
            window.editingId = id;
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = user.name;
            document.getElementById('edit-role').value = user.role;
            document.getElementById('edit-college').value = user.college;
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveEdit = async () => {
            const updates = {
                name: document.getElementById('edit-name').value,
                role: document.getElementById('edit-role').value,
                college: document.getElementById('edit-college').value
            };
            await update(ref(db, 'students/' + window.editingId), updates);
            document.getElementById('edit-modal').classList.add('hidden');
            alert("Profile Updated!");
        };

        // PROFILE PIC UPLOAD
        window.uploadPic = async (id, file) => {
            if(!file) return;
            const storageRef = sRef(storage, `profiles/${id}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await update(ref(db, 'students/' + id), { profilePic: url });
            alert("Photo Uploaded!");
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const newUser = {
                name: document.getElementById('reg-full-name').value.trim(),
                role: document.getElementById('reg-role').value,
                college: document.getElementById('reg-college').value,
                isBlocked: false
            };
            set(ref(db, 'students/' + id), newUser).then(() => { 
                alert("Registered! You can now Time In.");
                document.getElementById('reg-modal').classList.add('hidden');
                // Automatic go back to time-in panel
                document.getElementById('studentID').value = id;
            });
        };

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            const search = document.getElementById('adminSearch').value.toLowerCase();
            list.innerHTML = "";
            
            Object.entries(window.studentsData).forEach(([id, data]) => {
                if (search && !(id.includes(search) || data.name.toLowerCase().includes(search))) return;
                const pic = data.profilePic ? data.profilePic : 'https://via.placeholder.com/40';

                list.innerHTML += `<tr class="border-b text-sm">
                    <td class="p-3"><img src="${pic}" class="w-10 h-10 rounded-full border"></td>
                    <td class="p-3 font-bold">${id}</td>
                    <td class="p-3 uppercase font-black text-green-700">${data.name}</td>
                    <td class="p-3">
                        <input type="file" id="file-${id}" class="hidden" onchange="uploadPic('${id}', this.files[0])">
                        <button onclick="document.getElementById('file-${id}').click()" class="text-[10px] bg-slate-100 p-1 rounded">📷</button>
                        <button onclick="editUser('${id}')" class="text-blue-600 underline ml-2">Edit</button>
                        <button onclick="toggleBlock('${id}', ${data.isBlocked})" class="text-red-500 underline ml-2">${data.isBlocked ? 'Unblock' : 'Block'}</button>
                    </td>
                </tr>`;
            });
        }
        
        window.loginAdmin = () => signInWithPopup(auth, provider);
        function showAdminPanel() { document.getElementById('admin-panel').classList.remove('hidden'); document.getElementById('attendance-view').classList.add('hidden'); }
        function hideAdminPanel() { document.getElementById('admin-panel').classList.add('hidden'); document.getElementById('attendance-view').classList.remove('hidden'); }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div id="reg-modal" class="hidden fixed inset-0 bg-slate-900/90 flex items-center justify-center z-[9999]">
        <div class="bg-white rounded-[3rem] p-10 max-w-lg w-full border-t-8 border-[#CC0000]">
            <button onclick="document.getElementById('reg-modal').classList.add('hidden')" class="float-right text-slate-300 font-black">CANCEL</button>
            <h2 class="text-3xl font-black text-[#008000] mb-8 text-center italic">CREATE PROFILE</h2>
            <div class="space-y-4">
                <input type="text" id="reg-id" readonly class="w-full p-4 bg-slate-100 rounded-2xl text-center font-bold text-xl">
                <input type="text" id="reg-full-name" placeholder="FULL NAME" class="w-full p-5 border-2 rounded-2xl font-bold uppercase text-center text-lg">
                <select id="reg-role" class="w-full p-4 border-2 rounded-2xl font-bold">
                    <option>Student</option><option>Teacher</option>
                </select>
                <select id="reg-college" class="w-full p-4 border-2 rounded-2xl font-bold">
                    <option disabled selected>Choice Department</option>
                    <option>Integrated School (IS)</option>
                    <option>College of Informatics and Computing Studies (CICS)</option>
                    </select>
                <button onclick="saveNewUser()" class="w-full bg-[#008000] text-white py-6 rounded-[2rem] font-black uppercase text-xl">Register & Finish</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[10000]">
        <div class="bg-white p-8 rounded-[2rem] w-96 space-y-4">
            <h3 class="font-black text-[#008000]">EDIT USER PROFILE</h3>
            <input type="text" id="edit-id" readonly class="w-full p-2 bg-slate-50 border rounded-lg opacity-50">
            <input type="text" id="edit-name" class="w-full p-3 border-2 rounded-xl font-bold uppercase">
            <select id="edit-role" class="w-full p-3 border-2 rounded-xl font-bold">
                <option>Student</option><option>Teacher</option>
            </select>
            <select id="edit-college" class="w-full p-3 border-2 rounded-xl font-bold">
                <option>Integrated School (IS)</option>
                <option>College of Informatics and Computing Studies (CICS)</option>
                </select>
            <div class="flex gap-2">
                <button onclick="saveEdit()" class="flex-grow bg-[#008000] text-white py-3 rounded-xl font-bold">Save Changes</button>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="px-4 bg-slate-200 rounded-xl">Back</button>
            </div>
        </div>
    </div>
    
    </body>
</html>
