<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Staff Edition (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnrYNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "88114883918",
            appId: "1:88114883918:web:9dd831381ce90972d2a3c7",
            measurementId: "G-H8YCT6NRYV",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ADMIN_EMAIL = "jcesperanza@neu.edu.ph";
        window.currentUser = null;
        window.logsData = [];

        // Auth Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-toggle-btn').classList.remove('hidden');
                }
                
                loadLogs();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        function loadLogs() {
            onValue(ref(db, 'logs'), (snapshot) => {
                const data = snapshot.val();
                window.logsData = data ? Object.values(data) : [];
                updateStats();
                renderLogsTable();
            });
        }

        window.submitLog = () => {
            const reason = document.getElementById('visit-reason').value;
            const college = document.getElementById('user-college').value;
            const isEmployee = document.getElementById('is-employee').checked;

            const logEntry = {
                name: window.currentUser.displayName,
                email: window.currentUser.email,
                photo: window.currentUser.photoURL,
                reason: reason,
                college: college,
                isEmployee: isEmployee,
                timestamp: new Date().toISOString(),
                date: new Date().toLocaleDateString(),
                day: new Date().toLocaleDateString('en-US', { weekday: 'long' })
            };

            push(ref(db, 'logs'), logEntry).then(() => {
                alert("Welcome to NEU Library!");
            });
        };

        window.updateStats = () => {
            const filterReason = document.getElementById('filter-reason').value;
            const filterCollege = document.getElementById('filter-college').value;
            const filterType = document.getElementById('filter-type').value;

            let filtered = window.logsData.filter(log => {
                const matchReason = !filterReason || log.reason === filterReason;
                const matchCollege = !filterCollege || log.college === filterCollege;
                const matchType = !filterType || (filterType === 'Employee' ? log.isEmployee : !log.isEmployee);
                return matchReason && matchCollege && matchType;
            });

            const today = new Date().toLocaleDateString();
            document.getElementById('stat-today').innerText = filtered.filter(l => l.date === today).length;
            document.getElementById('stat-total').innerText = filtered.length;
            document.getElementById('stat-employees').innerText = filtered.filter(l => l.isEmployee).length;
        };

        function renderLogsTable() {
            const list = document.getElementById('recent-logs-list');
            list.innerHTML = window.logsData.slice(-10).reverse().map(l => `
                <tr class="border-b border-slate-50">
                    <td class="py-3 text-[10px]"><b>${l.name}</b><br>${l.college}</td>
                    <td class="py-3 text-[10px] text-right text-neu-green font-bold">${new Date(l.timestamp).toLocaleTimeString()}</td>
                </tr>
            `).join('');
        }

        window.toggleAdmin = () => {
            const panel = document.getElementById('admin-panel');
            const attendance = document.getElementById('attendance-view');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                attendance.classList.add('hidden');
                document.getElementById('admin-toggle-btn').innerText = "Back to User Mode";
            } else {
                panel.classList.add('hidden');
                attendance.classList.remove('hidden');
                document.getElementById('admin-toggle-btn').innerText = "Switch to Admin Mode";
            }
        };
    </script>

    <style>
        :root { --neu-green: #008000; --neu-red: #CC0000; }
        .bg-neu-green { background-color: var(--neu-green); }
        .text-neu-green { color: var(--neu-green); }
        .bg-neu-red { background-color: var(--neu-red); }
        .animate-pop { animation: fadeInScale 0.3s ease-out forwards; }
        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div id="login-screen" class="fixed inset-0 bg-neu-green flex items-center justify-center p-6 z-[100]">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center max-w-sm w-full animate-pop">
            <img src="download.png" class="w-24 h-24 mx-auto mb-6">
            <h1 class="text-2xl font-black text-slate-800 uppercase italic">NEU Library Log</h1>
            <p class="text-slate-400 text-xs font-bold mb-8 uppercase tracking-widest">Sign in to continue</p>
            <button onclick="login()" class="w-full flex items-center justify-center gap-4 bg-white border-2 border-slate-100 hover:bg-slate-50 p-4 rounded-2xl transition-all shadow-lg active:scale-95">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6 h-6">
                <span class="font-black text-slate-700 text-sm uppercase">Login with Google</span>
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col min-h-screen">
        <nav class="bg-neu-green text-white py-6 px-8 shadow-2xl flex justify-between items-center sticky top-0 z-50 border-b-8 border-neu-red">
            <div class="flex items-center gap-4">
                <img src="download.png" class="h-12 w-12 bg-white rounded-full p-1 shadow-xl">
                <div>
                    <h1 class="font-black text-lg uppercase leading-none tracking-tighter">New Era University</h1>
                    <p id="user-email" class="text-[8px] font-bold opacity-70"></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="admin-toggle-btn" onclick="toggleAdmin()" class="hidden bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all tracking-wider">Switch to Admin Mode</button>
                <button onclick="logout()" class="bg-neu-red hover:bg-red-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all shadow-lg">Logout</button>
            </div>
        </nav>

        <main class="container mx-auto p-4 md:p-8 flex flex-col items-center flex-grow">
            
            <div id="attendance-view" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-neu-green p-8 md:p-12 text-center animate-pop">
                <h2 class="text-4xl font-black text-neu-green uppercase italic tracking-tighter mb-8">Visitor Log</h2>
                
                <div class="space-y-4 text-left">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Reason for Visit</label>
                        <select id="visit-reason" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-neu-green transition-all">
                            <option>Study</option>
                            <option>Research</option>
                            <option>Borrow/Return Book</option>
                            <option>Clearance</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">College</label>
                        <select id="user-college" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-neu-green transition-all">
                            <option>ICS (Informatics & Computer Studies)</option>
                            <option>COE (Engineering)</option>
                            <option>CAS (Arts & Sciences)</option>
                            <option>CBA (Business Administration)</option>
                            <option>CED (Education)</option>
                        </select>
                    </div>

                    <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer">
                        <input type="checkbox" id="is-employee" class="w-5 h-5 accent-neu-green">
                        <span class="text-xs font-black text-slate-600 uppercase">I am an Employee (Staff/Faculty)</span>
                    </label>

                    <button onclick="submitLog()" class="w-full bg-neu-green hover:bg-green-800 text-white font-black py-6 rounded-3xl shadow-xl transition-all active:scale-95 text-xl uppercase italic tracking-tight mt-6">
                        Submit Attendance
                    </button>
                </div>
            </div>

            <div id="admin-panel" class="hidden w-full max-w-5xl space-y-8 animate-pop">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-8 rounded-[2rem] shadow-lg border-b-8 border-neu-green">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Visitors Today</h4>
                        <p id="stat-today" class="text-5xl font-black text-neu-green mt-2">0</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-lg border-b-8 border-blue-500">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Employee Count</h4>
                        <p id="stat-employees" class="text-5xl font-black text-blue-500 mt-2">0</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-lg border-b-8 border-neu-red">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Logs</h4>
                        <p id="stat-total" class="text-5xl font-black text-neu-red mt-2">0</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-md flex flex-wrap gap-4 items-center justify-between border border-slate-100">
                    <div class="flex flex-wrap gap-4 flex-grow">
                        <select id="filter-reason" onchange="updateStats()" class="p-3 bg-slate-50 rounded-xl text-[10px] font-bold outline-none border border-slate-100">
                            <option value="">All Reasons</option>
                            <option>Study</option><option>Research</option><option>Borrow/Return Book</option><option>Clearance</option>
                        </select>
                        <select id="filter-college" onchange="updateStats()" class="p-3 bg-slate-50 rounded-xl text-[10px] font-bold outline-none border border-slate-100">
                            <option value="">All Colleges</option>
                            <option>ICS</option><option>COE</option><option>CAS</option><option>CBA</option>
                        </select>
                        <select id="filter-type" onchange="updateStats()" class="p-3 bg-slate-50 rounded-xl text-[10px] font-bold outline-none border border-slate-100">
                            <option value="">All Users</option>
                            <option>Student</option><option>Employee</option>
                        </select>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="bg-slate-50 px-8 py-4 border-b border-slate-100 font-black text-[10px] text-slate-400 uppercase">Recent Activity</div>
                    <table class="w-full text-left">
                        <tbody id="recent-logs-list" class="divide-y divide-slate-50 px-8"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
