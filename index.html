<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Enhanced Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnRyNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "80114803910",
            appId: "1:80114803910:web:9dd831301ce90972d2a3c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();
        
        const ADMIN_EMAILS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];
        window.studentsData = {};
        window.logsData = {};
        window.currentEditId = null;

        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('admin-display-name').innerText = "Admin: " + user.email;
                showAdminPanel();
            } else {
                hideAdminPanel();
            }
        });

        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            updateUserTable();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            window.logsData = snapshot.val() || {};
            updateStatsCards();
        });

        // DATE FORMATTER (MM/DD/YYYY)
        const formatUIDate = (dateObj) => {
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            const y = dateObj.getFullYear();
            return `${m}/${d}/${y}`;
        };

        window.handleLog = async () => {
            const id = document.getElementById('studentID').value.trim();
            const reason = document.getElementById('visitReason').value;
            const user = window.studentsData[id];

            if (!user) return document.getElementById('profile-not-found').classList.remove('hidden');
            if (user.isBlocked) return alert("Account BLOCKED.");

            const now = new Date();
            const logEntry = {
                id, name: user.name, role: user.role, college: user.college, reason,
                date: formatUIDate(now), // Pinag-format na MM/DD/YYYY
                timestamp: now.toISOString()
            };

            await push(ref(db, 'logs'), logEntry);
            document.getElementById('log-form-container').classList.add('hidden');
            document.getElementById('welcome-msg').classList.remove('hidden');
            setTimeout(() => location.reload(), 2000);
        };

        window.openEditModal = (id) => {
            window.currentEditId = id;
            const user = window.studentsData[id];
            document.getElementById('edit-name').value = user.name;
            document.getElementById('edit-role').value = user.role;
            document.getElementById('edit-college').value = user.college;
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveEdit = async () => {
            await update(ref(db, `students/${window.currentEditId}`), {
                name: document.getElementById('edit-name').value.toUpperCase(),
                role: document.getElementById('edit-role').value,
                college: document.getElementById('edit-college').value
            });
            document.getElementById('edit-modal').classList.add('hidden');
        };

        window.uploadProfilePic = async (id, file) => {
            if (!file) return;
            const picRef = sRef(storage, `profiles/${id}`);
            await uploadBytes(picRef, file);
            const url = await getDownloadURL(picRef);
            await update(ref(db, `students/${id}`), { profilePic: url });
            alert("Photo Updated!");
        };

        window.updateUserTable = () => {
            const list = document.getElementById('user-manage-list');
            const search = document.getElementById('adminSearch').value.toLowerCase();
            list.innerHTML = "";
            Object.entries(window.studentsData).forEach(([id, data]) => {
                if (search && !(id.includes(search) || data.name.toLowerCase().includes(search))) return;
                const pic = data.profilePic || 'https://via.placeholder.com/40';
                list.innerHTML += `<tr class="border-b text-sm">
                    <td class="p-3"><img src="${pic}" class="w-12 h-12 rounded-full border-2 border-green-500 object-cover"></td>
                    <td class="p-3 font-bold">${id}</td>
                    <td class="p-3 uppercase font-black text-green-700">${data.name}</td>
                    <td class="p-3">
                        <div class="flex gap-2">
                            <button onclick="openEditModal('${id}')" class="text-blue-600 font-bold underline">Edit</button>
                            <button onclick="document.getElementById('file-${id}').click()" class="text-purple-600 font-bold underline">Pic</button>
                            <input type="file" id="file-${id}" class="hidden" onchange="uploadProfilePic('${id}', this.files[0])">
                            <button onclick="toggleBlock('${id}', ${data.isBlocked})" class="text-red-500 underline font-bold">${data.isBlocked ? 'Unblock' : 'Block'}</button>
                        </div>
                    </td>
                </tr>`;
            });
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const fullName = document.getElementById('reg-full-name').value.trim();
            const college = document.getElementById('reg-college').value;
            if(!fullName || college === "Choice Department") return alert("Complete the form");
            set(ref(db, 'students/' + id), {
                name: fullName.toUpperCase(), role: document.getElementById('reg-role').value,
                college: college, isBlocked: false
            }).then(() => { 
                document.getElementById('reg-modal').classList.add('hidden');
                document.getElementById('studentID').value = id;
                alert("Registered!"); 
            });
        };

        window.loginAdmin = () => signInWithPopup(auth, provider);
        window.logoutAdmin = () => signOut(auth).then(() => location.reload());
        window.toggleBlock = (id, status) => update(ref(db, 'students/' + id), { isBlocked: !status });
        window.startRegistration = async () => {
            await signInWithPopup(auth, provider);
            document.getElementById('reg-id').value = document.getElementById('studentID').value;
            document.getElementById('reg-modal').classList.remove('hidden');
        };

        function showAdminPanel() { 
            document.getElementById('main-card').classList.replace('max-w-xl', 'max-w-6xl'); 
            document.getElementById('attendance-view').classList.add('hidden'); 
            document.getElementById('admin-panel').classList.remove('hidden'); 
        }
        function hideAdminPanel() { 
            document.getElementById('main-card').classList.replace('max-w-6xl', 'max-w-xl'); 
            document.getElementById('admin-panel').classList.add('hidden'); 
            document.getElementById('attendance-view').classList.remove('hidden'); 
        }

        function updateStatsCards() {
            const logs = Object.values(window.logsData);
            const logList = document.getElementById('log-history-list');
            logList.innerHTML = "";
            logs.reverse().forEach(log => {
                logList.innerHTML += `<tr class="border-b text-xs">
                    <td class="p-3 font-mono">${log.date}</td>
                    <td class="p-3 font-black uppercase text-green-800">${log.name}</td>
                    <td class="p-3">${log.reason}</td>
                </tr>`;
            });
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <nav class="bg-[#008000] text-white py-6 px-10 shadow-xl flex justify-between items-center border-b-8 border-[#CC0000]">
        <h1 class="font-black text-3xl uppercase italic tracking-tighter">NEU Library System</h1>
        <div id="admin-display-name" class="text-xs font-mono"></div>
    </nav>

    <main class="container mx-auto p-4 flex flex-col items-center justify-center mt-10">
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-[#008000] p-10 transition-all duration-500">
            
            <div id="attendance-view" class="text-center space-y-8">
                <div id="welcome-msg" class="hidden py-10"><h2 class="text-6xl font-black text-[#008000] italic uppercase">Welcome!</h2></div>
                <div id="log-form-container" class="space-y-8">
                    <h2 class="text-5xl font-black text-[#008000] uppercase italic tracking-widest">Time In</h2>
                    <select id="visitReason" class="w-full p-6 bg-slate-50 border-2 rounded-2xl font-bold text-2xl">
                        <option>Reading</option><option>Research</option><option>Computer Use</option><option>Assignments</option><option>Books/Borrowing</option>
                    </select>
                    <input type="text" id="studentID" placeholder="00-00000-000" class="w-full p-10 border-4 border-slate-100 rounded-[2.5rem] text-center text-5xl font-mono uppercase bg-slate-50 outline-none focus:border-green-500">
                    <button onclick="handleLog()" class="w-full bg-[#008000] text-white font-black py-8 rounded-[2.5rem] text-3xl shadow-xl hover:scale-105 transition-transform">Confirm</button>
                    <div id="profile-not-found" class="hidden p-6 bg-red-50 rounded-2xl border border-red-200 text-red-600 font-bold text-lg">
                        No Profile Found. <button onclick="startRegistration()" class="underline text-red-700">Register with Google</button>
                    </div>
                    <button onclick="loginAdmin()" class="text-xs text-slate-300 font-bold uppercase mt-10">🔒 Admin Access</button>
                </div>
            </div>

            <div id="admin-panel" class="hidden space-y-8">
                <div class="flex justify-between items-center border-b pb-6">
                    <h2 class="text-4xl font-black text-[#008000] uppercase italic">Admin Panel</h2>
                    <button onclick="logoutAdmin()" class="bg-[#CC0000] text-white px-8 py-3 rounded-2xl font-black shadow-lg">LOGOUT</button>
                </div>
                
                <input type="text" id="adminSearch" onkeyup="updateUserTable()" placeholder="Search Name or ID..." class="w-full p-6 border-2 rounded-2xl font-bold text-xl outline-none focus:border-green-500 shadow-sm">

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div class="bg-white border-2 rounded-[2.5rem] overflow-hidden">
                        <div class="bg-slate-50 p-4 font-black text-center text-slate-400 uppercase text-xs">User List</div>
                        <div class="max-h-[500px] overflow-y-auto"><table class="w-full text-left"><tbody id="user-manage-list"></tbody></table></div>
                    </div>
                    <div class="bg-white border-2 rounded-[2.5rem] overflow-hidden">
                        <div class="bg-slate-50 p-4 font-black text-center text-slate-400 uppercase text-xs">Logs (MM/DD/YYYY)</div>
                        <div class="max-h-[500px] overflow-y-auto"><table class="w-full text-left"><tbody id="log-history-list"></tbody></table></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-slate-900/90 flex items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-[3rem] p-12 max-w-xl w-full border-t-8 border-[#CC0000] relative">
            <button onclick="document.getElementById('reg-modal').classList.add('hidden')" class="absolute top-8 right-10 text-slate-300 font-black text-2xl hover:text-red-500 uppercase">Cancel</button>
            <h2 class="text-4xl font-black text-[#008000] mb-10 text-center italic uppercase">Create Profile</h2>
            <div class="space-y-6">
                <input type="text" id="reg-id" readonly class="w-full p-5 bg-slate-100 rounded-2xl text-center font-bold text-2xl border-2">
                <input type="text" id="reg-full-name" placeholder="FULL NAME (LAST, FIRST)" class="w-full p-6 border-2 rounded-2xl font-bold uppercase text-center text-xl outline-none focus:border-green-500">
                <div class="grid grid-cols-2 gap-4">
                    <select id="reg-role" class="p-5 border-2 rounded-2xl font-bold text-lg"><option>Student</option><option>Teacher</option></select>
                    <select id="reg-year" class="p-5 border-2 rounded-2xl font-bold text-lg"><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>N/A</option></select>
                </div>
                <select id="reg-college" class="w-full p-5 border-2 rounded-2xl font-bold text-lg">
                    <option selected disabled>Choice Department</option>
                    <option>Integrated School (IS)</option><option>College of Accountancy (COA)</option><option>College of Agriculture (CAG)</option><option>College of Arts and Sciences (CAS)</option><option>College of Business Administration (CBA)</option><option>College of Communication (COC)</option><option>College of Informatics and Computing Studies (CICS)</option><option>College of Criminology (CCR)</option><option>College of Education (CED)</option><option>College of Engineering and Architecture (CEA)</option><option>College of Medical Technology (CMT)</option><option>College of Midwifery (CMW)</option><option>College of Music (COM)</option><option>College of Nursing (CON)</option><option>College of Physical Therapy (CPT)</option><option>College of Respiratory Therapy (CRT)</option><option>School of International Relations (SOIR)</option>
                </select>
                <button onclick="saveNewUser()" class="w-full bg-[#008000] text-white py-8 rounded-[2rem] font-black uppercase text-2xl shadow-2xl">Register & Finish</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[10000]">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl space-y-6">
            <h3 class="text-2xl font-black text-green-700 uppercase italic">Edit Profile</h3>
            <input type="text" id="edit-name" class="w-full p-4 border-2 rounded-xl font-bold uppercase">
            <select id="edit-role" class="w-full p-4 border-2 rounded-xl font-bold"><option>Student</option><option>Teacher</option></select>
            <select id="edit-college" class="w-full p-4 border-2 rounded-xl font-bold">
                <option>Integrated School (IS)</option><option>College of Accountancy (COA)</option><option>College of Informatics and Computing Studies (CICS)</option>
                </select>
            <div class="flex gap-4">
                <button onclick="saveEdit()" class="flex-grow bg-[#008000] text-white p-4 rounded-xl font-bold">Save Changes</button>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="bg-gray-200 px-6 rounded-xl font-bold">Back</button>
            </div>
        </div>
    </div>
</body>
</html>
