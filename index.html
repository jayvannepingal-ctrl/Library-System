<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Staff Edition (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIX: Heto ang iyong updated Firebase Config mula sa screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnrYNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "88114883918",
            appId: "1:88114883918:web:9dd831381ce90972d2a3c7",
            measurementId: "G-H8YCT6NRYV",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GLOBAL VARIABLES ---
        let studentsData = {};
        let logsData = [];

        // Real-time Sync mula sa Firebase
        onValue(ref(db, 'students'), (snapshot) => {
            studentsData = snapshot.val() || {};
            if (window.isAdminAuthenticated) updateAdminUI();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            const data = snapshot.val() || {};
            logsData = Object.values(data).reverse();
            if (window.isAdminAuthenticated) updateAdminUI();
        });

        // --- CORE FUNCTIONS ---
        window.handleAction = () => {
            const studentId = document.getElementById('studentId').value.trim();
            if (!studentId) return alert("Please enter Student ID");

            if (studentId === "1234") {
                showAdminLogin();
                return;
            }

            if (studentsData[studentId]) {
                processLog(studentId);
            } else {
                showRegistration(studentId);
            }
        };

        function processLog(id) {
            const now = new Date();
            const logEntry = {
                id: id,
                name: studentsData[id].name,
                course: studentsData[id].course,
                timestamp: now.toLocaleString(),
                date: now.toLocaleDateString()
            };

            push(ref(db, 'logs'), logEntry);
            alert(`Success! Hello, ${studentsData[id].name}`);
            document.getElementById('studentId').value = "";
        }

        window.registerStudent = () => {
            const id = document.getElementById('regId').value;
            const name = document.getElementById('regName').value;
            const course = document.getElementById('regCourse').value;

            if (!name || !course) return alert("Fill all fields");

            set(ref(db, `students/${id}`), { name, course });
            alert("Registered Successfully! You can now Time In.");
            closeModal('regModal');
            processLog(id);
        };

        // --- UI HELPERS ---
        function showRegistration(id) {
            document.getElementById('regId').value = id;
            document.getElementById('regModal').classList.remove('hidden');
        }

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        function showAdminLogin() {
            const pass = prompt("Enter Admin Password:");
            if (pass === "1234") {
                window.isAdminAuthenticated = true;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                updateAdminUI();
            } else {
                alert("Wrong Password!");
            }
        }

        function updateAdminUI() {
            const tableBody = document.getElementById('logTableBody');
            tableBody.innerHTML = logsData.map(log => `
                <tr class="border-b">
                    <td class="p-2">${log.timestamp}</td>
                    <td class="p-2">${log.id}</td>
                    <td class="p-2 font-bold">${log.name}</td>
                    <td class="p-2">${log.course}</td>
                </tr>
            `).join('');
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div id="loginSection" class="flex flex-col items-center justify-center h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-red-700 mb-2">NEU LIBRARY</h1>
            <p class="text-gray-500 mb-6">Student Time In/Out System</p>
            
            <input type="text" id="studentId" placeholder="Scan or Type Student ID" 
                class="w-full p-4 border-2 border-gray-200 rounded-xl mb-4 text-center text-xl focus:border-red-500 outline-none">
            
            <button onclick="handleAction()" 
                class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                ENTER
            </button>
        </div>
    </div>

    <div id="regModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4 text-red-700">New Student Registration</h2>
            <input type="text" id="regId" readonly class="w-full p-2 mb-3 bg-gray-100 border rounded">
            <input type="text" id="regName" placeholder="Full Name" class="w-full p-2 mb-3 border rounded">
            <select id="regCourse" class="w-full p-2 mb-4 border rounded">
                <option value="BSCS">BSCS</option>
                <option value="BSIT">BSIT</option>
                <option value="BSIS">BSIS</option>
                <option value="BSCPE">BSCPE</option>
            </select>
            <div class="flex gap-2">
                <button onclick="registerStudent()" class="flex-1 bg-green-600 text-white py-2 rounded">Register</button>
                <button onclick="closeModal('regModal')" class="flex-1 bg-gray-400 text-white py-2 rounded">Cancel</button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-red-700">Library Staff Dashboard</h1>
                <button onclick="location.reload()" class="bg-gray-200 px-4 py-2 rounded">Logout</button>
            </div>

            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-red-700 text-white">
                        <tr>
                            <th class="p-3">Time</th>
                            <th class="p-3">Student ID</th>
                            <th class="p-3">Name</th>
                            <th class="p-3">Course</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="text-gray-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
