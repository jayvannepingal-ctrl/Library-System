<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Admin Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnRyNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "80114803910",
            appId: "1:80114803910:web:9dd831301ce90972d2a3c7",
            measurementId: "G-H8YCT6MRYV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        const ADMIN_EMAILS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];
        window.studentsData = {};
        window.logsData = {};

        // 1. AUTH WATCHER - STRICT ADMIN ONLY
        onAuthStateChanged(auth, (user) => {
            const adminDisplay = document.getElementById('admin-display-name');
            if (user && ADMIN_EMAILS.includes(user.email)) {
                adminDisplay.innerText = "Logged in: " + user.email;
                showAdminPanel();
            } else {
                adminDisplay.innerText = "";
                hideAdminPanel();
            }
        });

        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            updateUserTable();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            window.logsData = snapshot.val() || {};
            updateStatsCards();
        });

        const isValidID = (id) => /^\d{2}-\d{5}-\d{3}$/.test(id);

        // 2. TIME IN LOGIC
        window.handleLog = async () => {
            const idInput = document.getElementById('studentID');
            const id = idInput.value.trim();
            const reason = document.getElementById('visitReason').value;
            
            if(!isValidID(id)) {
                alert("Maling ID Format! Gamitin ang: 00-00000-000");
                return;
            }

            const user = window.studentsData[id];

            if (!user) {
                document.getElementById('profile-not-found').classList.remove('hidden');
                return;
            }

            if(user.isBlocked) { alert("This account is BLOCKED."); return; }

            const now = new Date();
            const logEntry = {
                id: id,
                name: user.name,
                role: user.role,
                college: user.college,
                reason: reason,
                date: now.toLocaleDateString('en-CA'),
                timestamp: now.toLocaleString()
            };

            await push(ref(db, 'logs'), logEntry);
            
            document.getElementById('log-form-container').classList.add('hidden');
            document.getElementById('welcome-msg').classList.remove('hidden');
            idInput.value = "";

            setTimeout(() => {
                document.getElementById('welcome-msg').classList.add('hidden');
                document.getElementById('log-form-container').classList.remove('hidden');
            }, 3000);
        };

        // 3. REGISTRATION LOGIC
        window.startRegistration = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const googleEmail = result.user.email;
                const id = document.getElementById('studentID').value.trim();

                const exists = Object.values(window.studentsData).some(u => u.googleEmail === googleEmail);
                if(exists) {
                    alert("Account is already exist");
                    await signOut(auth);
                    return;
                }

                document.getElementById('profile-not-found').classList.add('hidden');
                document.getElementById('reg-id').value = id;
                document.getElementById('reg-google-email').value = googleEmail;
                document.getElementById('reg-modal').classList.remove('hidden');
            } catch (e) { alert("Google Sign-in failed."); }
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const fullName = document.getElementById('reg-full-name').value;
            if(!fullName) { alert("Please type your full name."); return; }

            const file = document.getElementById('reg-photo').files[0];
            const saveData = (photoUrl = "") => {
                const newUser = {
                    name: fullName,
                    role: document.getElementById('reg-role').value,
                    college: document.getElementById('reg-college').value,
                    year: document.getElementById('reg-year').value,
                    googleEmail: document.getElementById('reg-google-email').value,
                    photo: photoUrl || "https://ui-avatars.com/api/?name="+fullName,
                    isBlocked: false
                };
                set(ref(db, 'students/' + id), newUser).then(() => {
                    alert("Registered! Please Time-In now.");
                    document.getElementById('reg-modal').classList.add('hidden');
                    signOut(auth); // Sign out para hindi mag-stay na admin kung hindi naman admin
                });
            };

            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => saveData(reader.result);
                reader.readAsDataURL(file);
            } else { saveData(); }
        };

        // 4. ADMIN ACTIONS
        window.deleteLog = (key) => {
            if(confirm("Burahin itong entry?")) remove(ref(db, 'logs/' + key));
        };

        window.toggleBlock = (id, status) => {
            update(ref(db, 'students/' + id), { isBlocked: !status });
        };

        window.editUser = (id) => {
            const user = window.studentsData[id];
            const nYear = prompt("Edit Year (1st-4th):", user.year);
            const nColl = prompt("Edit College:", user.college);
            if(nYear && nColl) update(ref(db, 'students/' + id), { year: nYear, college: nColl });
        };

        window.exportToExcel = () => {
            const data = Object.values(window.logsData);
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "Library_Logs.xlsx");
        };

        function updateStatsCards() {
            const logs = Object.values(window.logsData);
            const filterDate = document.getElementById('filterDate').value;
            const filterCol = document.getElementById('filterCol').value;
            const filterReason = document.getElementById('filterReason').value;

            const filtered = logs.filter(l => {
                const dMatch = filterDate ? l.date === filterDate : true;
                const cMatch = filterCol !== "All" ? l.college === filterCol : true;
                const rMatch = filterReason !== "All" ? l.reason === filterReason : true;
                return dMatch && cMatch && rMatch;
            });

            document.getElementById('stat-total').innerText = filtered.length;
            document.getElementById('stat-student').innerText = filtered.filter(l => l.role === 'Student').length;
            document.getElementById('stat-staff').innerText = filtered.filter(l => l.role !== 'Student').length;

            const logList = document.getElementById('log-history-list');
            logList.innerHTML = "";
            Object.entries(window.logsData).reverse().forEach(([key, log]) => {
                logList.innerHTML += `<tr class="border-b text-[10px]">
                    <td class="p-2">${log.timestamp}</td>
                    <td class="p-2 font-bold">${log.id}</td>
                    <td class="p-2">${log.name}</td>
                    <td class="p-2">${log.reason}</td>
                    <td class="p-2"><button onclick="deleteLog('${key}')" class="text-red-500 font-bold">Delete</button></td>
                </tr>`;
            });
        }

        window.applyFilters = () => updateStatsCards();

        function showAdminPanel() {
            document.getElementById('main-card').classList.replace('max-w-xl', 'max-w-6xl');
            document.getElementById('attendance-view').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        function hideAdminPanel() {
            document.getElementById('main-card').classList.replace('max-w-6xl', 'max-w-xl');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('attendance-view').classList.remove('hidden');
        }

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            list.innerHTML = "";
            Object.entries(window.studentsData).forEach(([id, data]) => {
                if(id === "course" || id === "name" || id === "role") return; // Skip broken data
                list.innerHTML += `<tr class="border-b text-xs">
                    <td class="p-2 font-bold">${id}</td>
                    <td class="p-2 flex items-center gap-2"><img src="${data.photo}" class="w-6 h-6 rounded-full border">${data.name}</td>
                    <td class="p-2">${data.college}</td>
                    <td class="p-2 uppercase font-bold">${data.role}</td>
                    <td class="p-2">
                        <button onclick="editUser('${id}')" class="text-blue-600 mr-2 underline">Edit</button>
                        <button onclick="toggleBlock('${id}', ${data.isBlocked})" class="${data.isBlocked ? 'text-green-600' : 'text-red-600'} font-bold">
                            ${data.isBlocked ? 'Unblock' : 'Block'}
                        </button>
                    </td>
                </tr>`;
            });
        }

        window.loginAdmin = () => signInWithPopup(auth, provider);
        window.logoutAdmin = () => signOut(auth).then(() => location.reload());
    </script>

    <style>
        :root { --neu-green: #008000; --neu-red: #CC0000; }
        .bg-neu-green { background-color: var(--neu-green); }
        .text-neu-green { color: var(--neu-green); }
        .bg-neu-red { background-color: var(--neu-red); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

    <nav class="bg-neu-green text-white py-4 px-8 shadow-xl flex justify-between items-center border-b-8 border-neu-red">
        <div class="flex items-center gap-4">
            <img src="download.png" onerror="this.src='https://via.placeholder.com/60?text=NEU'" class="h-16 w-16 bg-white rounded-full p-1">
            <div><h1 class="font-black text-xl uppercase">New Era University</h1><p class="text-[10px] font-bold opacity-80">Library Management System</p></div>
        </div>
        <div id="admin-display-name" class="text-[10px] font-mono"></div>
    </nav>

    <main class="container mx-auto p-4 flex flex-col items-center justify-center flex-grow">
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-neu-green p-8 text-center relative overflow-hidden">
            
            <div id="attendance-view">
                <div id="welcome-msg" class="hidden py-16"><h2 class="text-5xl font-black text-neu-green italic">Welcome to Library!</h2></div>

                <div id="log-form-container" class="space-y-6">
                    <h2 class="text-4xl font-black text-neu-green uppercase italic">Time In</h2>
                    <div class="space-y-4 text-left">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Reason for Visiting</label>
                        <select id="visitReason" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold">
                            <option>Leisure or assigned reading</option><option>Academic research & journals</option>
                            <option>IT facilities & internet</option><option>Study & homework</option><option>Borrowing or returning items</option>
                        </select>
                        <input type="text" id="studentID" placeholder="00-00000-000" maxlength="12" class="w-full p-6 border-2 border-slate-100 rounded-[2rem] text-center text-3xl font-mono uppercase bg-slate-50">
                        <button onclick="handleLog()" class="w-full bg-neu-green text-white font-black py-6 rounded-[2rem] text-2xl uppercase shadow-lg">Confirm Attendance</button>
                    </div>

                    <div id="profile-not-found" class="hidden p-4 bg-red-50 rounded-2xl border border-red-200">
                        <p class="text-red-600 font-bold text-sm mb-2">Profile not found. Please Sign-in with Google to Register.</p>
                        <button onclick="startRegistration()" class="bg-red-600 text-white px-6 py-2 rounded-xl font-bold uppercase text-xs">OK</button>
                    </div>
                    <div class="pt-4"><button onclick="loginAdmin()" class="text-slate-400 font-bold text-[10px] uppercase">🔒 Admin Login</button></div>
                </div>
            </div>

            <div id="admin-panel" class="hidden text-left space-y-6">
                <div class="flex justify-between items-center border-b pb-4">
                    <h2 class="text-3xl font-black text-neu-green uppercase italic">Admin Portal</h2>
                    <div class="flex gap-2">
                        <button onclick="exportToExcel()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-xs">EXPORT EXCEL</button>
                        <button onclick="logoutAdmin()" class="bg-neu-red text-white px-4 py-2 rounded-xl font-bold text-xs">LOGOUT</button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 bg-slate-50 p-4 rounded-2xl border">
                    <div><label class="text-[8px] font-bold uppercase">Date</label><input type="date" id="filterDate" onchange="applyFilters()" class="w-full p-1 text-xs rounded border"></div>
                    <div><label class="text-[8px] font-bold uppercase">College</label><select id="filterCol" onchange="applyFilters()" class="w-full p-1 text-xs rounded border"><option>All</option><option>CICS</option><option>CAS</option><option>CBA</option></select></div>
                    <div><label class="text-[8px] font-bold uppercase">Reason</label><select id="filterReason" onchange="applyFilters()" class="w-full p-1 text-xs rounded border"><option>All</option><option>Leisure or assigned reading</option><option>Academic research & journals</option></select></div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-neu-green text-white p-4 rounded-3xl"><p class="text-[10px] font-bold uppercase">Total Visitors</p><h3 id="stat-total" class="text-3xl font-black">0</h3></div>
                    <div class="bg-slate-50 border p-4 rounded-3xl"><p class="text-[10px] font-bold uppercase text-slate-400">Students</p><h3 id="stat-student" class="text-3xl font-black text-neu-green">0</h3></div>
                    <div class="bg-slate-50 border p-4 rounded-3xl"><p class="text-[10px] font-bold uppercase text-slate-400">Faculty/Admin</p><h3 id="stat-staff" class="text-3xl font-black text-neu-red">0</h3></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="bg-white border rounded-3xl overflow-hidden max-h-60 overflow-y-auto">
                        <table class="w-full text-left text-[10px]"><thead class="bg-slate-50 sticky top-0"><tr><th class="p-2">ID</th><th class="p-2">Name</th><th class="p-2">College</th><th class="p-2">Act</th></tr></thead><tbody id="user-manage-list"></tbody></table>
                    </div>
                    <div class="bg-white border rounded-3xl overflow-hidden max-h-60 overflow-y-auto">
                        <table class="w-full text-left text-[10px]"><thead class="bg-slate-50 sticky top-0"><tr><th class="p-2">Time</th><th class="p-2">ID</th><th class="p-2">Name</th><th class="p-2">Del</th></tr></thead><tbody id="log-history-list"></tbody></table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[3rem] p-8 max-w-md w-full border-t-8 border-neu-red overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black text-neu-green mb-4">Create Profile</h2>
            <div class="space-y-4">
                <input type="file" id="reg-photo" accept="image/*" class="text-xs w-full">
                <input type="text" id="reg-id" readonly class="w-full p-2 bg-slate-100 rounded-xl font-bold text-center">
                <input type="text" id="reg-google-email" readonly class="w-full p-2 bg-slate-50 rounded-xl text-xs">
                <input type="text" id="reg-full-name" placeholder="Full Name" class="w-full p-3 border-2 rounded-xl font-bold">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-2 border rounded-xl font-bold text-xs"><option>Student</option><option>Teacher</option><option>Admin</option></select>
                    <select id="reg-year" class="p-2 border rounded-xl font-bold text-xs"><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>N/A</option></select>
                </div>
                <select id="reg-college" class="w-full p-2 border rounded-xl font-bold text-xs">
                    <option>Integrated School (IS)</option><option>College of Informatics and Computing Studies (CICS)</option>
                    <option>College of Arts and Sciences (CAS)</option><option>College of Engineering and Architecture (CEA)</option>
                </select>
                <button onclick="saveNewUser()" class="w-full bg-neu-green text-white py-4 rounded-2xl font-black uppercase">Register & Finish</button>
            </div>
        </div>
    </div>
</body>
</html>
