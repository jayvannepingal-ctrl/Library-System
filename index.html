<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Staff Edition (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnrYNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "88114883918",
            appId: "1:88114883918:web:9dd831381ce90972d2a3c7",
            measurementId: "G-H8YCT6NRYV",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.studentsData = {};
        window.logsData = [];

        // Sync Students
        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            if (window.isAdminAuthenticated) updateUserTable();
        });

        // Sync Logs
        onValue(ref(db, 'logs'), (snapshot) => {
            const val = snapshot.val();
            window.logsData = val ? Object.values(val) : [];
            if (window.isAdminAuthenticated) updateDashboard();
        });

        // Attendance Logic
        window.handleLog = () => {
            const idInput = document.getElementById('studentID');
            const id = idInput.value.trim();
            if(!id) return;

            const user = window.studentsData[id];
            if (!user) {
                document.getElementById('reg-id').value = id;
                document.getElementById('reg-modal').classList.remove('hidden');
                return;
            }

            const now = new Date();
            const logEntry = {
                id: id,
                name: user.name,
                role: user.role,
                course: user.course,
                timestamp: now.toLocaleTimeString(),
                date: now.toLocaleDateString(),
                day: now.toLocaleDateString('en-US', { weekday: 'short' })
            };

            push(ref(db, 'logs'), logEntry);
            showFeedback(user, logEntry.timestamp);
            idInput.value = "";
            idInput.focus();
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const fileInput = document.getElementById('reg-file');
            const processSave = (imgData) => {
                const newUser = {
                    name: document.getElementById('reg-name').value,
                    role: document.getElementById('reg-role').value,
                    sex: document.getElementById('reg-sex').value,
                    course: document.getElementById('reg-course').value,
                    year: document.getElementById('reg-year').value,
                    religion: document.getElementById('reg-religion').value,
                    photo: imgData || 'https://via.placeholder.com/150'
                };
                set(ref(db, 'students/' + id), newUser).then(() => {
                    document.getElementById('reg-modal').classList.add('hidden');
                    window.handleLog();
                });
            };
            if(fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => processSave(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else { processSave(); }
        };

        window.deleteStudent = (id) => { if (confirm(`Remove student ${id}?`)) remove(ref(db, 'students/' + id)); };
        
        window.updateUserAccount = () => {
            const id = document.getElementById('edit-id').value;
            const updatedData = {
                name: document.getElementById('edit-name').value,
                course: document.getElementById('edit-course').value,
                year: document.getElementById('edit-year').value
            };
            update(ref(db, 'students/' + id), updatedData).then(() => {
                document.getElementById('edit-modal').classList.add('hidden');
            });
        };

        window.exportData = () => {
            if(window.logsData.length === 0) return alert("No logs to export!");
            const ws = XLSX.utils.json_to_sheet(window.logsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "LibraryLogs");
            XLSX.writeFile(wb, "NEU_Library_Report.xlsx");
        };
    </script>

    <style>
        :root { --neu-green: #008000; --neu-red: #CC0000; }
        .bg-neu-green { background-color: var(--neu-green); }
        .text-neu-green { color: var(--neu-green); }
        .bg-neu-red { background-color: var(--neu-red); }
        .animate-pop { animation: fadeInScale 0.3s ease-out forwards; }
        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #main-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans flex flex-col">

    <nav class="bg-neu-green text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-40 border-b-4 border-neu-red">
        <div class="flex items-center gap-3">
            <img src="download.png" class="h-10 w-10 bg-white rounded-full p-1 shadow-md" onerror="this.src='https://via.placeholder.com/40'">
            <div>
                <h1 class="font-black text-sm md:text-lg uppercase leading-none">New Era University</h1>
                <p class="text-[9px] uppercase font-bold italic opacity-80 tracking-widest">Library System | Cloud Edition</p>
            </div>
        </div>
        <div id="liveClock" class="font-mono text-[10px] bg-black/20 px-3 py-1 rounded-full hidden sm:block"></div>
    </nav>

    <main class="container mx-auto p-6 flex flex-col items-center justify-center flex-grow">
        
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-neu-green p-8 md:p-12 text-center overflow-hidden">
            
            <div id="attendance-view" class="space-y-8 animate-pop">
                <div class="space-y-2">
                    <h2 class="text-4xl font-black text-neu-green uppercase italic tracking-tighter">Type ID</h2>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Please enter your student number</p>
                </div>
                
                <div class="space-y-4">
                    <input type="text" id="studentID" autofocus placeholder="24-12782-483" 
                        class="w-full p-6 border-2 border-slate-100 rounded-3xl focus:border-green-600 outline-none text-center text-3xl font-mono uppercase shadow-inner bg-slate-50">
                    <button onclick="handleLog()" class="w-full bg-neu-green hover:bg-green-800 text-white font-black py-6 rounded-3xl shadow-lg transition-all active:scale-95 text-2xl uppercase italic">
                        Time In
                    </button>
                </div>

                <div class="pt-6 border-t border-slate-50">
                    <button onclick="loginAdmin()" class="text-slate-300 hover:text-neu-green font-bold text-[10px] uppercase tracking-[0.2em] transition-colors">
                        🔒 Staff Login Portal
                    </button>
                </div>

                <div id="log-feedback" class="hidden mt-6 p-6 rounded-[2.5rem] bg-white border border-slate-100 animate-pop shadow-2xl">
                    <img id="fb-pic" src="" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-neu-green shadow-md object-cover">
                    <h3 id="fb-name" class="text-2xl font-black text-slate-800 tracking-tight"></h3>
                    <p id="fb-role" class="text-neu-red font-bold text-xs uppercase mb-3"></p>
                    <div class="py-2 px-6 bg-neu-green text-white rounded-2xl text-xs font-black inline-block shadow-sm" id="fb-time"></div>
                </div>
            </div>

            <div id="admin-panel" class="hidden text-left animate-pop w-full space-y-6">
                <div class="flex justify-between items-end border-b pb-6 border-slate-100">
                    <div>
                        <h2 class="text-3xl font-black text-neu-green uppercase italic tracking-tighter leading-none">Staff Portal</h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em] mt-1">Cloud Management</p>
                    </div>
                    <button onclick="logoutAdmin()" class="bg-neu-red hover:bg-red-700 text-white px-6 py-2 rounded-2xl font-black text-[10px] uppercase tracking-wider transition-all active:scale-90 shadow-md">Logout</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 h-60 flex flex-col shadow-inner">
                        <span class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Traffic Analytics</span>
                        <div class="flex-grow"><canvas id="trafficChart"></canvas></div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 h-60 flex flex-col shadow-inner overflow-hidden">
                        <span class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Recent Activity</span>
                        <div class="overflow-y-auto custom-scrollbar flex-grow pr-2">
                            <table class="w-full text-[11px]">
                                <tbody id="recent-logs-list" class="divide-y divide-slate-200/50"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Database</span>
                        
                        <div class="relative w-full md:w-64">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </span>
                            <input type="text" id="userSearchInput" onkeyup="filterUsers()" placeholder="Search Name or ID..." 
                                class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold focus:outline-none focus:ring-2 focus:ring-green-500 transition-all">
                        </div>
                    </div>
                    
                    <div class="max-h-64 overflow-y-auto custom-scrollbar">
                        <table class="w-full text-xs">
                            <thead class="bg-slate-50/80 sticky top-0 text-[9px] font-black text-slate-400 uppercase">
                                <tr>
                                    <th class="p-4 text-left">Profile</th>
                                    <th class="p-4 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="user-manage-list" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>

                <button onclick="exportData()" class="w-full bg-neu-green hover:bg-green-800 text-white py-5 rounded-[1.5rem] font-black text-xs uppercase tracking-[0.2em] shadow-lg transition-all active:scale-95">
                    Generate Cloud Report (Excel)
                </button>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-green-900/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[3rem] p-10 max-w-sm w-full shadow-2xl border-t-8 border-neu-red animate-pop">
            <h2 class="text-2xl font-black text-neu-green mb-6 uppercase italic tracking-tighter">New Registration</h2>
            <div class="space-y-4">
                <input type="text" id="reg-id" readonly class="w-full p-4 bg-slate-100 rounded-2xl font-bold text-green-700 text-center">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 border rounded-2xl font-bold">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-4 border rounded-2xl font-bold text-xs"><option>Student</option><option>Faculty</option></select>
                    <select id="reg-sex" class="p-4 border rounded-2xl font-bold text-xs"><option>Male</option><option>Female</option></select>
                </div>
                <input type="text" id="reg-course" placeholder="Course" class="w-full p-4 border rounded-2xl font-bold">
                <input type="text" id="reg-year" placeholder="Year" class="w-full p-4 border rounded-2xl font-bold">
                <input type="text" id="reg-religion" placeholder="Religion" class="w-full p-4 border rounded-2xl font-bold">
                <input type="file" id="reg-file" accept="image/*" class="w-full text-[10px] p-2 bg-slate-50 rounded-xl">
                <div class="flex gap-3 pt-4">
                    <button onclick="saveNewUser()" class="flex-1 bg-neu-green text-white py-4 rounded-2xl font-black uppercase italic shadow-lg">Save</button>
                    <button onclick="document.getElementById('reg-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-4 rounded-2xl font-black uppercase text-slate-400">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full animate-pop">
            <h2 class="text-xl font-black text-neu-green mb-4 uppercase italic">Edit Profile</h2>
            <div class="space-y-4">
                <input type="text" id="edit-id" readonly class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                <input type="text" id="edit-name" class="w-full p-4 border rounded-2xl font-bold">
                <input type="text" id="edit-course" class="w-full p-4 border rounded-2xl font-bold">
                <input type="text" id="edit-year" class="w-full p-4 border rounded-2xl font-bold">
                <div class="flex gap-2 pt-4">
                    <button onclick="updateUserAccount()" class="flex-1 bg-neu-green text-white py-4 rounded-2xl font-black uppercase">Update</button>
                    <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-4 rounded-2xl font-black uppercase">Back</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance;
        window.isAdminAuthenticated = false;
        const ADMIN_PASS = "1234";

        setInterval(() => { 
            const now = new Date(); 
            document.getElementById('liveClock').innerHTML = now.toLocaleDateString() + ' | ' + now.toLocaleTimeString(); 
        }, 1000);

        function loginAdmin() {
            const pass = prompt("Enter Staff Password:");
            if (pass === ADMIN_PASS) {
                window.isAdminAuthenticated = true;
                const card = document.getElementById('main-card');
                card.classList.replace('max-w-xl', 'max-w-4xl'); // Expand Card
                document.getElementById('attendance-view').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                if(!chartInstance) initChart();
                updateDashboard();
                updateUserTable();
            } else if (pass !== null) { alert("Access Denied!"); }
        }

        function logoutAdmin() { 
            window.isAdminAuthenticated = false; 
            const card = document.getElementById('main-card');
            card.classList.replace('max-w-4xl', 'max-w-xl'); // Shrink Card
            document.getElementById('admin-panel').classList.add('hidden'); 
            document.getElementById('attendance-view').classList.remove('hidden'); 
        }

        function filterUsers() {
            const filter = document.getElementById('userSearchInput').value.toLowerCase();
            const rows = document.getElementById('user-manage-list').getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].textContent || rows[i].innerText;
                rows[i].style.display = text.toLowerCase().includes(filter) ? "" : "none";
            }
        }

        function updateDashboard() {
            if(!window.logsData) return;
            const reversedLogs = [...window.logsData].reverse().slice(0, 30);
            document.getElementById('recent-logs-list').innerHTML = reversedLogs.map(l => `
                <tr class="border-b border-slate-50">
                    <td class="py-2"><b>${l.name}</b><br><span class="opacity-50 text-[9px] uppercase">${l.course}</span></td>
                    <td class="py-2 text-right text-neu-green font-bold">${l.timestamp}</td>
                </tr>
            `).join('');
            
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const counts = days.map(d => window.logsData.filter(l => l.day === d).length);
            if(chartInstance) { chartInstance.data.datasets[0].data = counts; chartInstance.update(); }
        }

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            const studentsArr = Object.entries(window.studentsData || {});
            list.innerHTML = studentsArr.map(([id, u]) => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 flex items-center gap-3">
                        <img src="${u.photo}" class="w-8 h-8 rounded-full object-cover border border-slate-200">
                        <div><b class="text-slate-700">${u.name}</b><br><span class="text-[9px] font-mono text-slate-400">${id} | ${u.course}</span></div>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="openEditModal('${id}')" class="text-neu-green font-black text-[10px] uppercase mr-3">Edit</button>
                        <button onclick="deleteStudent('${id}')" class="text-neu-red font-black text-[10px] uppercase">Del</button>
                    </td>
                </tr>
            `).join('');
        }

        function openEditModal(id) {
            const u = window.studentsData[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = u.name;
            document.getElementById('edit-course').value = u.course;
            document.getElementById('edit-year').value = u.year;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function showFeedback(user, time) {
            const box = document.getElementById('log-feedback');
            document.getElementById('fb-name').innerText = user.name;
            document.getElementById('fb-role').innerText = `${user.role} | ${user.course}`;
            document.getElementById('fb-time').innerText = "✅ TIME IN: " + time;
            document.getElementById('fb-pic').src = user.photo;
            box.classList.remove('hidden'); 
            setTimeout(() => { box.classList.add('hidden'); }, 4000);
        }

        function initChart() {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            chartInstance = new Chart(ctx, { 
                type: 'bar', 
                data: { 
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'], 
                    datasets: [{ label: 'Entries', data: [0,0,0,0,0,0], backgroundColor: '#008000', borderRadius: 8 }] 
                }, 
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } } 
            });
        }
    </script>
</body>
</html>
