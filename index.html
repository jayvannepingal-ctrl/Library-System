<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Staff Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnrYNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "88114883918",
            appId: "1:88114883918:web:9dd831381ce90972d2a3c7",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.studentsData = {};
        window.logsData = [];
        const ADMINS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];

        // Auth Listener for Admin and User
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (ADMINS.includes(user.email)) {
                    enterAdminMode();
                } else {
                    // If regular user just logged in for registration
                    document.getElementById('google-btn-container').classList.add('hidden');
                    document.getElementById('registration-form').classList.remove('hidden');
                }
            }
        });

        onValue(ref(db, 'students'), (snap) => window.studentsData = snap.val() || {});
        onValue(ref(db, 'logs'), (snap) => {
            const val = snap.val();
            window.logsData = val ? Object.values(val) : [];
            if (window.isAdminAuthenticated) updateDashboard();
        });

        // 1. Google Login for Admin
        window.loginAdmin = () => signInWithPopup(auth, provider);

        // 2. ID Format Validation (Regex: 00-00000-000)
        const validateID = (id) => /^\d{2}-\d{5}-\d{3}$/.test(id);

        window.handleLog = () => {
            const idInput = document.getElementById('studentID');
            const id = idInput.value.trim();
            
            if(!validateID(id)) {
                alert("Invalid ID Format! Please follow: 00-00000-000");
                return;
            }

            const user = window.studentsData[id];
            if (!user) {
                document.getElementById('reg-id').value = id;
                document.getElementById('reg-modal').classList.remove('hidden');
                return;
            }

            const now = new Date();
            const logEntry = {
                id, name: user.name, role: user.role, college: user.course,
                reason: document.getElementById('visitReason').value,
                isEmployee: user.role !== 'Student',
                timestamp: now.toLocaleTimeString(),
                date: now.toISOString().split('T')[0],
                day: now.toLocaleDateString('en-US', { weekday: 'short' })
            };

            push(ref(db, 'logs'), logEntry);
            showFeedback(user, logEntry.timestamp);
            idInput.value = "";
            alert("Welcome to NEU Library!");
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const newUser = {
                name: document.getElementById('reg-name').value,
                role: document.getElementById('reg-role').value,
                sex: document.getElementById('reg-sex').value,
                course: document.getElementById('reg-college').value, 
                year: document.getElementById('reg-year').value,
                photo: 'https://via.placeholder.com/150'
            };
            set(ref(db, 'students/' + id), newUser).then(() => {
                document.getElementById('reg-modal').classList.add('hidden');
                window.handleLog();
            });
        };

        function enterAdminMode() {
            window.isAdminAuthenticated = true;
            document.getElementById('attendance-view').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('main-card').classList.replace('max-w-xl', 'max-w-6xl');
            updateDashboard();
        }

        window.logoutAdmin = () => signOut(auth).then(() => location.reload());
    </script>
    <style>
        :root { --neu-green: #008000; --neu-red: #CC0000; }
        .bg-neu-green { background-color: var(--neu-green); }
        .text-neu-green { color: var(--neu-green); }
        .bg-neu-red { background-color: var(--neu-red); }
        #main-card { transition: all 0.4s ease; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <nav class="bg-neu-green text-white py-4 px-8 shadow-xl flex justify-between items-center border-b-4 border-neu-red">
        <div class="flex items-center gap-4">
            <img src="download.png" class="h-12 w-12 bg-white rounded-full p-1" onerror="this.src='https://via.placeholder.com/50'">
            <h1 class="font-black text-xl uppercase tracking-tighter">NEU Library System</h1>
        </div>
    </nav>

    <main class="container mx-auto p-6 flex flex-col items-center justify-center">
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl p-10 text-center border-t-8 border-neu-green">
            
            <div id="attendance-view" class="space-y-6">
                <h2 class="text-4xl font-black text-neu-green italic uppercase">Time In</h2>
                <div class="space-y-4 text-left">
                    <select id="visitReason" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                        <option>Study / Reading</option>
                        <option>Research</option>
                        <option>Borrow / Return Books</option>
                    </select>
                    <input type="text" id="studentID" placeholder="00-00000-000" class="w-full p-6 border-2 rounded-3xl text-center text-3xl font-mono uppercase bg-slate-50 focus:border-neu-green outline-none shadow-inner">
                    <button onclick="handleLog()" class="w-full bg-neu-green text-white font-black py-5 rounded-3xl text-xl shadow-lg active:scale-95 transition">Confirm Attendance</button>
                </div>
                <button onclick="loginAdmin()" class="text-slate-400 text-xs font-bold hover:text-neu-green">🔒 STAFF LOGIN PORTAL</button>
            </div>

            <div id="admin-panel" class="hidden text-left space-y-6 w-full">
                <div class="flex justify-between items-center">
                    <h2 class="text-3xl font-black text-neu-green italic">STAFF DASHBOARD</h2>
                    <button onclick="logoutAdmin()" class="bg-neu-red text-white px-6 py-2 rounded-xl font-bold text-xs shadow-md">LOGOUT</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-green-50 p-6 rounded-3xl border border-green-100">
                        <p class="text-[10px] font-black text-green-600 uppercase">Total Visitors</p>
                        <p id="filteredCount" class="text-4xl font-black text-neu-green">0</p>
                    </div>
                    <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100 text-blue-700">
                        <p class="text-[10px] font-black uppercase">Staff/Faculty Today</p>
                        <p id="staffCount" class="text-4xl font-black">0</p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-3xl border border-slate-200">
                        <p class="text-[10px] font-black text-slate-500 uppercase">Active College</p>
                        <p id="topCollege" class="text-2xl font-black text-slate-800">CICS</p>
                    </div>
                </div>

                <div class="bg-white border rounded-3xl p-6 shadow-inner max-h-80 overflow-y-auto">
                    <table class="w-full text-sm">
                        <tbody id="recent-logs-list" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[3rem] p-8 max-w-md w-full shadow-2xl border-t-8 border-neu-red">
            <h3 class="text-2xl font-black text-neu-green mb-4">CREATE PROFILE</h3>
            
            <div id="google-btn-container" class="space-y-4">
                <p class="text-slate-500 text-sm">Please sign-in with your Google Account to continue registration.</p>
                <button onclick="loginAdmin()" class="w-full flex items-center justify-center gap-3 bg-white border-2 p-3 rounded-2xl font-bold hover:bg-slate-50">
                    <img src="https://www.google.com/favicon.ico" class="w-5"> Login with Google
                </button>
            </div>

            <div id="registration-form" class="hidden space-y-3">
                <input type="text" id="reg-id" readonly class="w-full p-3 bg-slate-100 rounded-xl font-bold text-center text-neu-green">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-3 border rounded-xl outline-none focus:border-neu-green">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-3 border rounded-xl"><option>Student</option><option>Staff</option><option>Faculty</option></select>
                    <select id="reg-sex" class="p-3 border rounded-xl"><option>Male</option><option>Female</option></select>
                </div>
                <select id="reg-college" class="w-full p-3 border rounded-xl">
                    <option value="CICS">CICS</option><option value="COE">COE</option><option value="CAS">CAS</option><option value="CBA">CBA</option>
                </select>
                <input type="text" id="reg-year" placeholder="Year Level" class="w-full p-3 border rounded-xl">
                <button onclick="saveNewUser()" class="w-full bg-neu-green text-white py-4 rounded-2xl font-black shadow-lg">REGISTER & TIME IN</button>
            </div>
        </div>
    </div>

    <script>
        function showFeedback(user, time) {
            console.log("Logged:", user.name, "at", time);
        }

        function updateDashboard() {
            const list = document.getElementById('recent-logs-list');
            const logs = window.logsData || [];
            document.getElementById('filteredCount').innerText = logs.length;
            document.getElementById('staffCount').innerText = logs.filter(l => l.isEmployee).length;
            
            list.innerHTML = [...logs].reverse().slice(0, 10).map(l => `
                <tr class="hover:bg-slate-50">
                    <td class="p-3"><b>${l.name}</b><br><span class="text-[10px] text-slate-400 uppercase">${l.college}</span></td>
                    <td class="p-3 text-right font-black text-neu-green">${l.timestamp}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
