<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Enhanced Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnRyNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "80114803910",
            appId: "1:80114803910:web:9dd831301ce90972d2a3c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        const ADMIN_EMAILS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];
        window.studentsData = {};
        window.logsData = {};
        let selectedProfilePic = "";

        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('admin-display-name').innerText = "Admin: " + user.email;
                showAdminPanel();
            } else {
                hideAdminPanel();
            }
        });

        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            updateUserTable();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            window.logsData = snapshot.val() || {};
            updateStatsCards();
        });

        // --- CORE FUNCTIONS ---
        window.handleLog = async () => {
            const idInput = document.getElementById('studentID');
            const id = idInput.value.trim();
            const reason = document.getElementById('visitReason').value;
            
            const idPattern = /^\d{2}-\d{5}-\d{3}$/;
            if (!idPattern.test(id)) return alert("Format must be: 00-00000-000");

            const user = window.studentsData[id];
            if (!user) return document.getElementById('profile-not-found').classList.remove('hidden');
            if (user.isBlocked) return alert("Account BLOCKED.");

            const now = new Date();
            const logKey = push(ref(db, 'logs')).key;
            const logEntry = {
                id, name: user.name, role: user.role, college: user.college, reason,
                date: now.toLocaleDateString('en-CA'), timestamp: now.toISOString()
            };

            await set(ref(db, 'logs/' + logKey), logEntry);
            document.getElementById('log-form-container').classList.add('hidden');
            document.getElementById('welcome-msg').innerHTML = `
                <img src="${user.profilePic || 'https://via.placeholder.com/150'}" class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-green-500 object-cover shadow-lg">
                <h2 class="text-5xl font-black text-[#008000] italic">Welcome, ${user.name.split(',')[0]}!</h2>
            `;
            document.getElementById('welcome-msg').classList.remove('hidden');
            setTimeout(() => location.reload(), 3000);
        };

        window.handleFileSelect = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                selectedProfilePic = reader.result;
                document.getElementById('img-preview').src = reader.result;
            };
            if (file) reader.readAsDataURL(file);
        };

        window.startRegistration = async () => {
            const id = document.getElementById('studentID').value.trim();
            const idPattern = /^\d{2}-\d{5}-\d{3}$/;
            if (!idPattern.test(id)) return alert("ID format must be 00-00000-000");
            
            const result = await signInWithPopup(auth, provider);
            document.getElementById('reg-id').value = id;
            document.getElementById('reg-google-email').value = result.user.email;
            document.getElementById('reg-modal').classList.remove('hidden');
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const fullName = document.getElementById('reg-full-name').value.trim();
            const college = document.getElementById('reg-college').value;

            if(!fullName) return alert("Enter Full Name");
            if(college === "CHOOSE DEPARTMENT") return alert("Please select a department");

            const newUser = {
                name: fullName, role: document.getElementById('reg-role').value,
                college: college, year: document.getElementById('reg-year').value,
                googleEmail: document.getElementById('reg-google-email').value, 
                profilePic: selectedProfilePic, isBlocked: false
            };

            set(ref(db, 'students/' + id), newUser).then(() => { 
                alert("Profile Created!"); 
                document.getElementById('reg-modal').classList.add('hidden');
                window.handleLog(); 
            });
        };

        // --- ADMIN PANEL CONTROLS ---
        window.applyFilters = () => {
            updateStatsCards();
            updateUserTable();
        };

        window.editUser = (id) => {
            const user = window.studentsData[id];
            const newName = prompt("Update Name:", user.name);
            const newRole = prompt("Update Role (Student/Teacher):", user.role);
            if (newName && newRole) {
                update(ref(db, 'students/' + id), { name: newName, role: newRole });
            }
        };

        window.toggleBlock = (id, status) => update(ref(db, 'students/' + id), { isBlocked: !status });

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            const search = document.getElementById('adminSearch').value.toLowerCase();
            list.innerHTML = "";
            
            Object.entries(window.studentsData).forEach(([id, data]) => {
                if (search && !(id.includes(search) || (data.name && data.name.toLowerCase().includes(search)))) return;

                list.innerHTML += `
                <tr class="border-b text-[12px] hover:bg-slate-50 transition-colors">
                    <td class="p-2"><img src="${data.profilePic || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full object-cover border"></td>
                    <td class="p-2 font-mono">${id}</td>
                    <td class="p-2 font-black uppercase text-green-700">${data.name || '---'}</td>
                    <td class="p-2 text-slate-500">${data.role || '---'}</td>
                    <td class="p-2 flex gap-2">
                        <button onclick="editUser('${id}')" class="text-blue-500 hover:underline">Edit</button>
                        <button onclick="toggleBlock('${id}', ${data.isBlocked})" class="text-red-500 font-bold hover:underline">${data.isBlocked ? 'Unblock' : 'Block'}</button>
                    </td>
                </tr>`;
            });
        }

        function updateStatsCards() {
            const logEntries = Object.entries(window.logsData).map(([key, data]) => ({ firebaseKey: key, ...data }));
            const fDate = document.getElementById('filterDate').value;
