<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Admin Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // WAG GALAWIN ANG CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnRyNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "80114803910",
            appId: "1:80114803910:web:9dd831301ce90972d2a3c7",
            measurementId: "G-H8YCT6MRYV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        const ADMIN_EMAILS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];
        window.studentsData = {};
        window.logsData = [];

        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('admin-display-name').innerText = "Admin: " + user.email;
                showAdminPanel();
            } else {
                hideAdminPanel();
            }
        });

        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            updateUserTable();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            const val = snapshot.val();
            window.logsData = val ? Object.values(val) : [];
            updateStatsCards();
        });

        const isValidID = (id) => /^\d{2}-\d{5}-\d{3}$/.test(id);

        window.handleLog = async () => {
            const idInput = document.getElementById('studentID');
            const id = idInput.value.trim();
            const reason = document.getElementById('visitReason').value;
            const logForm = document.getElementById('log-form-container');
            const welcomeMsg = document.getElementById('welcome-msg');
            
            if(!isValidID(id)) {
                alert("Maling ID Format! Gamitin ang: 00-00000-000");
                return;
            }

            const user = window.studentsData[id];

            if (!user) {
                if(confirm("Profile not found. Please Sign-in with Google to Register.")) {
                    try {
                        const result = await signInWithPopup(auth, provider);
                        const googleEmail = result.user.email;
                        const exists = Object.values(window.studentsData).some(u => u.googleEmail === googleEmail);
                        
                        if(exists) {
                            alert("Account already exists with a different ID.");
                            await signOut(auth);
                            return;
                        }
                        document.getElementById('reg-id').value = id;
                        document.getElementById('reg-google-email').value = googleEmail;
                        document.getElementById('reg-modal').classList.remove('hidden');
                    } catch (e) { alert("Google Sign-in failed."); }
                }
                return;
            }

            if(user.isBlocked) {
                alert("This account is BLOCKED.");
                return;
            }

            try {
                const now = new Date();
                // FIX: Nilagyan ng || "" para hindi mag-error ang Firebase kung may kulang na info sa student record
                const logEntry = {
                    id: id,
                    name: user.name || "Unknown",
                    role: user.role || "Student",
                    college: user.college || "N/A",
                    reason: reason,
                    timestamp: now.toLocaleTimeString(),
                    date: now.toLocaleDateString('en-CA'),
                    fullDate: now.toLocaleString()
                };

                await push(ref(db, 'logs'), logEntry);
                
                // UI LOGIC
                logForm.classList.add('hidden');
                welcomeMsg.classList.remove('hidden');
                idInput.value = "";

                setTimeout(() => {
                    welcomeMsg.classList.add('hidden');
                    logForm.classList.remove('hidden');
                }, 3000);
            } catch (err) {
                console.error(err);
                alert("Error saving log: " + err.message);
            }
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const fullName = document.getElementById('reg-full-name').value;
            if(!fullName) { alert("Please type your full name."); return; }

            const file = document.getElementById('reg-photo').files[0];
            const reader = new FileReader();

            const saveData = (photoUrl = "") => {
                const newUser = {
                    name: fullName,
                    role: document.getElementById('reg-role').value,
                    college: document.getElementById('reg-college').value,
                    year: document.getElementById('reg-year').value,
                    googleEmail: document.getElementById('reg-google-email').value,
                    photo: photoUrl || "https://ui-avatars.com/api/?name="+fullName,
                    isBlocked: false
                };
                set(ref(db, 'students/' + id), newUser).then(() => {
                    alert("Registration Successful! You can now Time In.");
                    document.getElementById('reg-modal').classList.add('hidden');
                });
            };

            if (file) {
                reader.onloadend = () => saveData(reader.result);
                reader.readAsDataURL(file);
            } else {
                saveData();
            }
        };

        window.toggleBlock = (id, status) => {
            update(ref(db, 'students/' + id), { isBlocked: !status });
        };

        window.editUser = (id) => {
            const user = window.studentsData[id];
            const nYear = prompt("Edit Year (1st-4th):", user.year);
            const nColl = prompt("Edit College:", user.college);
            if(nYear && nColl) update(ref(db, 'students/' + id), { year: nYear, college: nColl });
        };

        window.loginAdmin = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                if (!ADMIN_EMAILS.includes(result.user.email)) {
                    alert("Unauthorized Access.");
                    await signOut(auth);
                }
            } catch (e) { alert("Admin Login Failed"); }
        };

        window.logoutAdmin = () => signOut(auth).then(() => location.reload());

        function updateStatsCards() {
            document.getElementById('stat-total').innerText = window.logsData.length;
            document.getElementById('stat-student').innerText = window.logsData.filter(l => l.role === 'Student').length;
            document.getElementById('stat-staff').innerText = window.logsData.filter(l => l.role !== 'Student').length;
        }

        function showAdminPanel() {
            document.getElementById('main-card').classList.replace('max-w-xl', 'max-w-6xl');
            document.getElementById('attendance-view').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        function hideAdminPanel() {
            document.getElementById('main-card').classList.replace('max-w-6xl', 'max-w-xl');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('attendance-view').classList.remove('hidden');
        }

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            list.innerHTML = "";
            Object.entries(window.studentsData).forEach(([id, data]) => {
                list.innerHTML += `<tr class="border-b text-xs">
                    <td class="p-2 font-bold">${id}</td>
                    <td class="p-2 flex items-center gap-2"><img src="${data.photo}" class="w-6 h-6 rounded-full border">${data.name}</td>
                    <td class="p-2">${data.college}</td>
                    <td class="p-2 uppercase font-bold">${data.role}</td>
                    <td class="p-2">
                        <button onclick="editUser('${id}')" class="text-blue-600 mr-2 underline">Edit</button>
                        <button onclick="toggleBlock('${id}', ${data.isBlocked})" class="${data.isBlocked ? 'text-green-600' : 'text-red-600'} font-bold">
                            ${data.isBlocked ? 'Unblock' : 'Block'}
                        </button>
                    </td>
                </tr>`;
            });

            const logList = document.getElementById('log-history-list');
            logList.innerHTML = "";
            [...window.logsData].reverse().slice(0, 50).forEach(log => {
                logList.innerHTML += `<tr class="border-b text-[10px]">
                    <td class="p-2">${log.fullDate}</td>
                    <td class="p-2 font-bold">${log.id}</td>
                    <td class="p-2">${log.name}</td>
                    <td class="p-2 italic">${log.reason}</td>
                </tr>`;
            });
        }
    </script>

    <style>
        :root { --neu-green: #008000; --neu-red: #CC0000; }
        .bg-neu-green { background-color: var(--neu-green); }
        .text-neu-green { color: var(--neu-green); }
        .bg-neu-red { background-color: var(--neu-red); }
        #main-card { transition: all 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans flex flex-col">

    <nav class="bg-neu-green text-white py-4 px-8 shadow-xl flex justify-between items-center border-b-8 border-neu-red">
        <div class="flex items-center gap-4">
            <img src="download.png" onerror="this.src='https://via.placeholder.com/60?text=NEU'" class="h-16 w-16 bg-white rounded-full p-1">
            <div>
                <h1 class="font-black text-xl uppercase leading-none">New Era University</h1>
                <p class="text-[10px] uppercase font-bold opacity-80 tracking-widest">Library Management System</p>
            </div>
        </div>
        <div id="admin-display-name" class="text-xs font-mono opacity-80"></div>
    </nav>

    <main class="container mx-auto p-4 flex flex-col items-center justify-center flex-grow">
        
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-neu-green p-8 text-center relative overflow-hidden">
            
            <div id="attendance-view" class="w-full">
                <div id="welcome-msg" class="hidden py-16">
                    <h2 class="text-5xl font-black text-neu-green italic animate-pulse">Welcome to Library!</h2>
                    <p class="text-slate-400 font-bold mt-4 uppercase">Success: Logged in to system</p>
                </div>

                <div id="log-form-container" class="space-y-6">
                    <h2 class="text-4xl font-black text-neu-green uppercase italic">Time In</h2>
                    
                    <div class="space-y-4 text-left">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Reason for Visiting</label>
                        <select id="visitReason" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold">
                            <optgroup label="Reading"><option>Leisure or assigned reading</option></optgroup>
                            <optgroup label="Research"><option>Academic research & journals</option></optgroup>
                            <optgroup label="Computer"><option>IT facilities & internet</option></optgroup>
                            <optgroup label="Assignments"><option>Study & homework</option></optgroup>
                            <optgroup label="Books"><option>Borrowing or returning items</option></optgroup>
                        </select>

                        <input type="text" id="studentID" placeholder="00-00000-000" maxlength="12"
                            class="w-full p-6 border-2 border-slate-100 rounded-[2rem] text-center text-3xl font-mono uppercase shadow-inner bg-slate-50">
                        
                        <button onclick="handleLog()" class="w-full bg-neu-green hover:bg-green-800 text-white font-black py-6 rounded-[2rem] text-2xl uppercase italic shadow-lg">
                            Confirm Attendance
                        </button>
                    </div>

                    <div class="pt-6 border-t">
                        <button onclick="loginAdmin()" class="text-slate-400 hover:text-neu-green font-bold text-xs uppercase tracking-widest">
                            🔒 Admin Login
                        </button>
                    </div>
                </div>
            </div>

            <div id="admin-panel" class="hidden text-left w-full space-y-6">
                <div class="flex justify-between items-center border-b pb-4">
                    <h2 class="text-3xl font-black text-neu-green uppercase italic">Admin Portal</h2>
                    <button onclick="logoutAdmin()" class="bg-neu-red text-white px-4 py-2 rounded-xl font-bold text-xs">LOGOUT</button>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-neu-green text-white p-4 rounded-3xl"><p class="text-[10px] font-bold uppercase opacity-80">Total</p><h3 id="stat-total" class="text-3xl font-black">0</h3></div>
                    <div class="bg-slate-50 border p-4 rounded-3xl"><p class="text-[10px] font-bold uppercase text-slate-400">Students</p><h3 id="stat-student" class="text-3xl font-black text-neu-green">0</h3></div>
                    <div class="bg-slate-50 border p-4 rounded-3xl"><p class="text-[10px] font-bold uppercase text-slate-400">Admin</p><h3 id="stat-staff" class="text-3xl font-black text-neu-red">0</h3></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="bg-white border rounded-3xl overflow-hidden max-h-80 overflow-y-auto">
                        <table class="w-full text-left"><thead class="bg-slate-50 sticky top-0 font-bold text-[10px] uppercase"><tr><th class="p-2">ID</th><th class="p-2">Name</th><th class="p-2">Col</th><th class="p-2">Role</th><th class="p-2">Act</th></tr></thead><tbody id="user-manage-list"></tbody></table>
                    </div>
                    <div class="bg-white border rounded-3xl overflow-hidden max-h-80 overflow-y-auto">
                        <table class="w-full text-left"><thead class="bg-slate-50 sticky top-0 font-bold text-[10px] uppercase"><tr><th class="p-2">Date/Time</th><th class="p-2">ID</th><th class="p-2">Name</th><th class="p-2">Reason</th></tr></thead><tbody id="log-history-list"></tbody></table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[3rem] p-8 max-w-md w-full border-t-8 border-neu-red overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black text-neu-green mb-4 uppercase italic">Create Profile</h2>
            <div class="space-y-4">
                <input type="file" id="reg-photo" accept="image/*" class="text-xs w-full p-2 border border-dashed rounded-xl">
                <input type="text" id="reg-id" readonly class="w-full p-3 bg-slate-100 rounded-xl font-bold text-center">
                <input type="text" id="reg-google-email" readonly class="w-full p-3 bg-slate-50 rounded-xl text-xs">
                
                <input type="text" id="reg-full-name" placeholder="Type your Full Name" class="w-full p-4 border-2 border-neu-green/20 rounded-2xl font-bold">

                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-3 border rounded-xl font-bold text-xs"><option>Student</option><option>Teacher</option><option>Admin</option></select>
                    <select id="reg-year" class="p-3 border rounded-xl font-bold text-xs"><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>N/A</option></select>
                </div>

                <select id="reg-college" class="w-full p-3 border rounded-xl font-bold text-xs">
                    <option>Integrated School (IS)</option><option>College of Informatics and Computing Studies (CICS)</option>
                    <option>College of Accountancy (COA)</option><option>College of Engineering and Architecture (CEA)</option>
                    <option>College of Arts and Sciences (CAS)</option><option>College of Business Administration (CBA)</option>
                    <option>College of Education (CED)</option><option>College of Nursing (CON)</option>
                </select>

                <button onclick="saveNewUser()" class="w-full bg-neu-green text-white py-4 rounded-2xl font-black uppercase italic shadow-lg">Register & Finish</button>
            </div>
        </div>
    </div>
</body>
</html>
