<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Staff Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnrYNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com/",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "88114883918",
            appId: "1:88114883918:web:9dd831381ce90972d2a3c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ADMINS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];
        window.studentsData = {};
        window.logsData = [];

        onValue(ref(db, 'students'), (snap) => {
            window.studentsData = snap.val() || {};
        });

        onValue(ref(db, 'logs'), (snap) => {
            const val = snap.val();
            window.logsData = val ? Object.values(val) : [];
            updateDashboard();
        });

        window.loginAdmin = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                if (ADMINS.includes(result.user.email)) {
                    document.getElementById('attendance-view').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('main-container').classList.replace('max-w-xl', 'max-w-6xl');
                } else {
                    alert("Access Denied: Admin only.");
                }
            } catch (error) {
                alert("Login Error: Check Firebase Support Email.");
            }
        };

        window.handleLog = () => {
            const id = document.getElementById('studentID').value.trim();
            const user = window.studentsData[id];
            if (!user) {
                document.getElementById('reg-id').value = id;
                document.getElementById('reg-modal').classList.remove('hidden');
                return;
            }
            const logEntry = {
                id, name: user.name, course: user.course,
                reason: document.getElementById('visitReason').value,
                timestamp: new Date().toLocaleTimeString(),
                date: new Date().toISOString().split('T')[0]
            };
            push(ref(db, 'logs'), logEntry);
            alert("Welcome to NEU Library!");
            document.getElementById('studentID').value = "";
        };

        window.updateDashboard = () => {
            const fCollege = document.getElementById('filterCollege').value;
            const fReason = document.getElementById('filterReason').value;

            let filtered = window.logsData.filter(l => {
                return (!fCollege || l.course === fCollege) && (!fReason || l.reason === fReason);
            });

            // Update Cards
            document.getElementById('card-total').innerText = filtered.length;
            const collegeCounts = filtered.reduce((acc, curr) => {
                acc[curr.course] = (acc[curr.course] || 0) + 1;
                return acc;
            }, {});
            const topC = Object.entries(collegeCounts).sort((a,b) => b[1]-a[1])[0];
            document.getElementById('card-top').innerText = topC ? topC[0] : 'N/A';

            // Update List
            const list = document.getElementById('recent-logs-list');
            list.innerHTML = [...filtered].reverse().slice(0, 15).map(l => `
                <div class="flex justify-between items-center py-3 border-b border-gray-100">
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${l.name}</p>
                        <p class="text-[10px] text-gray-400 uppercase">${l.course}</p>
                    </div>
                    <p class="text-[10px] font-bold text-gray-500">${l.reason}</p>
                    <p class="text-xs font-black text-green-600">${l.timestamp}</p>
                </div>
            `).join('');
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const newUser = {
                name: document.getElementById('reg-name').value,
                course: document.getElementById('reg-college').value,
                role: "Student"
            };
            set(ref(db, 'students/' + id), newUser).then(() => {
                document.getElementById('reg-modal').classList.add('hidden');
                window.handleLog();
            });
        };

        window.logoutAdmin = () => location.reload();
    </script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-[#008000] p-6 border-b-4 border-red-600 shadow-lg">
        <div class="container mx-auto flex items-center gap-4 text-white">
            <div class="bg-white p-2 rounded-full w-14 h-14 flex items-center justify-center font-black text-[#008000]">NEU</div>
            <div>
                <h1 class="text-xl font-black uppercase italic">New Era University</h1>
                <p class="text-[9px] font-bold tracking-widest opacity-80">Library Management System</p>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4 flex justify-center">
        <div id="main-container" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl p-10 transition-all duration-500 border-t-8 border-[#008000]">
            
            <div id="attendance-view" class="text-center space-y-6">
                <h2 class="text-4xl font-black text-[#008000] italic uppercase">Time In</h2>
                <div class="text-left space-y-4">
                    <select id="visitReason" class="w-full p-4 bg-gray-50 border rounded-2xl font-bold outline-none">
                        <option>Study / Reading</option>
                        <option>Research</option>
                        <option>Borrow / Return Books</option>
                        <option>Computer and Internet</option>
                        <option>Clearance</option>
                    </select>
                    <input type="text" id="studentID" placeholder="ENTER ID NUMBER" class="w-full p-6 bg-gray-50 border-2 rounded-3xl text-center text-3xl font-mono focus:border-[#008000] outline-none">
                    <button onclick="handleLog()" class="w-full bg-[#008000] text-white py-5 rounded-3xl font-black text-xl shadow-lg hover:bg-green-800 transition uppercase">Confirm Attendance</button>
                    <button onclick="loginAdmin()" class="w-full text-gray-300 text-[10px] font-bold hover:text-[#008000] uppercase tracking-widest mt-4">🔒 Staff Login</button>
                </div>
            </div>

            <div id="admin-panel" class="hidden space-y-8">
                <div class="flex justify-between items-center border-b pb-4">
                    <h2 class="text-2xl font-black text-[#008000] italic uppercase">Dashboard</h2>
                    <button onclick="logoutAdmin()" class="bg-red-600 text-white px-6 py-2 rounded-full font-bold text-xs uppercase">Logout</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-green-50 p-6 rounded-3xl border border-green-100 shadow-sm">
                        <p class="text-[10px] font-black text-green-600 uppercase">Total Visitors</p>
                        <p id="card-total" class="text-4xl font-black text-[#008000]">0</p>
                    </div>
                    <div class="bg-red-50 p-6 rounded-3xl border border-red-100 shadow-sm">
                        <p class="text-[10px] font-black text-red-600 uppercase">Top College</p>
                        <p id="card-top" class="text-2xl font-black text-red-700">N/A</p>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-2xl flex gap-4 border">
                    <select id="filterCollege" onchange="updateDashboard()" class="w-1/2 p-2 rounded-lg text-xs font-bold border">
                        <option value="">All Colleges</option>
                        <option>CICS</option><option>CAS</option><option>CBA</option><option>COE</option>
                    </select>
                    <select id="filterReason" onchange="updateDashboard()" class="w-1/2 p-2 rounded-lg text-xs font-bold border">
                        <option value="">All Purposes</option>
                        <option>Study / Reading</option><option>Computer and Internet</option>
                    </select>
                </div>

                <div class="bg-white border rounded-3xl p-6 shadow-sm">
                    <h3 class="text-[#008000] font-black text-xs uppercase tracking-widest mb-4">Recent Activity</h3>
                    <div id="recent-logs-list" class="h-80 overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full border-t-8 border-red-600 shadow-2xl">
            <h2 class="text-xl font-black text-[#008000] uppercase mb-4">New Profile</h2>
            <div class="space-y-4">
                <input type="text" id="reg-id" readonly class="w-full p-4 bg-gray-100 rounded-xl font-bold text-center">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 border rounded-xl font-bold outline-none">
                <select id="reg-college" class="w-full p-4 border rounded-xl font-bold">
                    <option>CICS</option><option>CAS</option><option>CBA</option><option>COE</option>
                </select>
                <button onclick="saveNewUser()" class="w-full bg-[#008000] text-white py-4 rounded-xl font-black uppercase shadow-lg">Register & Time In</button>
                <button onclick="document.getElementById('reg-modal').classList.add('hidden')" class="w-full text-gray-400 font-bold text-[10px] mt-2 uppercase tracking-widest">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
