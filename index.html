<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System | Official Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnRyNwknI",
            authDomain: "student-library-system-3e72c.firebaseapp.com",
            databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com",
            projectId: "student-library-system-3e72c",
            storageBucket: "student-library-system-3e72c.firebasestorage.app",
            messagingSenderId: "80114803910",
            appId: "1:80114803910:web:9dd831301ce90972d2a3c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        const ADMIN_EMAILS = ["jcesperanza@neu.edu.ph", "jayvanne.pingal@neu.edu.ph"];
        window.studentsData = {};
        window.logsData = {};

        // ID FORMATTER LOGIC (00-00000-000)
        document.addEventListener('input', (e) => {
            if(e.target.id === 'studentID') {
                let v = e.target.value.replace(/\D/g,'');
                if (v.length > 2 && v.length <= 7) v = v.slice(0,2) + '-' + v.slice(2);
                else if (v.length > 7) v = v.slice(0,2) + '-' + v.slice(2,7) + '-' + v.slice(7,10);
                e.target.value = v;
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('admin-display-name').innerText = "Admin: " + user.email;
                showAdminPanel();
            } else {
                hideAdminPanel();
            }
        });

        onValue(ref(db, 'students'), (snapshot) => {
            window.studentsData = snapshot.val() || {};
            updateUserTable();
        });

        onValue(ref(db, 'logs'), (snapshot) => {
            window.logsData = snapshot.val() || {};
            updateStatsCards();
        });

        // DATE FORMATTER (MM/DD/YYYY)
        const getFormattedDate = (dateObj) => {
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            const y = dateObj.getFullYear();
            return `${m}/${d}/${y}`;
        };

        window.handleLog = async () => {
            const id = document.getElementById('studentID').value.trim();
            const reason = document.getElementById('visitReason').value;
            const user = window.studentsData[id];

            if (!user) {
                document.getElementById('profile-not-found').classList.remove('hidden');
                return;
            }
            if (user.isBlocked) return alert("Account BLOCKED.");

            const now = new Date();
            const logEntry = {
                id, name: user.name, role: user.role, college: user.college, reason,
                date: getFormattedDate(now),
                timestamp: now.toISOString()
            };

            await push(ref(db, 'logs'), logEntry);
            document.getElementById('log-form-container').classList.add('hidden');
            document.getElementById('welcome-msg').classList.remove('hidden');
            setTimeout(() => location.reload(), 2500);
        };

        window.saveNewUser = () => {
            const id = document.getElementById('reg-id').value;
            const fullName = document.getElementById('reg-full-name').value.trim();
            const college = document.getElementById('reg-college').value;
            
            if(!fullName || college === "Choice Department") return alert("Please complete the form.");

            const newUser = {
                name: fullName.toUpperCase(), 
                role: document.getElementById('reg-role').value,
                college: college, 
                year: document.getElementById('reg-year').value,
                googleEmail: document.getElementById('reg-google-email').value, 
                isBlocked: false
            };

            set(ref(db, 'students/' + id), newUser).then(() => {
                document.getElementById('reg-modal').classList.add('hidden');
                window.studentsData[id] = newUser; // Sync local data
                handleLog(); // AUTO TIME-IN
            });
        };

        window.exportToExcel = () => {
            const data = Object.values(window.logsData);
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Logs");
            XLSX.writeFile(wb, "Library_Logs.xlsx");
        };

        window.applyFilters = () => {
            updateStatsCards();
        };

        function updateStatsCards() {
            const logs = Object.values(window.logsData);
            const fDateInput = document.getElementById('filterDate').value;
            let fDate = "";
            if(fDateInput) {
                const [y, m, d] = fDateInput.split('-');
                fDate = `${m}/${d}/${y}`;
            }
            const fCol = document.getElementById('filterCol').value;
            const fReason = document.getElementById('filterReason').value;

            const filtered = logs.filter(l => {
                return (fDate ? l.date === fDate : true) &&
                       (fCol !== "All Colleges" ? l.college === fCol : true) &&
                       (fReason !== "All Reasons" ? l.reason === fReason : true);
            });

            document.getElementById('stat-total').innerText = filtered.length;
            const logList = document.getElementById('log-history-list');
            logList.innerHTML = "";
            filtered.reverse().forEach(log => {
                logList.innerHTML += `<tr class="border-b text-xs">
                    <td class="p-3 font-mono">${log.date}</td>
                    <td class="p-3 font-black uppercase text-green-800">${log.name}</td>
                    <td class="p-3">${log.reason}</td>
                </tr>`;
            });
        }

        function updateUserTable() {
            const list = document.getElementById('user-manage-list');
            const search = document.getElementById('adminSearch').value.toLowerCase();
            list.innerHTML = "";
            Object.entries(window.studentsData).forEach(([id, data]) => {
                if (search && !(id.includes(search) || data.name.toLowerCase().includes(search))) return;
                list.innerHTML += `<tr class="border-b text-sm">
                    <td class="p-3 font-bold">${id}</td>
                    <td class="p-3 font-black uppercase">${data.name}</td>
                    <td class="p-3"><button onclick="toggleBlock('${id}', ${data.isBlocked})" class="text-red-500 underline font-bold">${data.isBlocked ? 'Unblock' : 'Block'}</button></td>
                </tr>`;
            });
        }

        window.toggleBlock = (id, status) => update(ref(db, 'students/' + id), { isBlocked: !status });
        window.loginAdmin = () => signInWithPopup(auth, provider);
        window.logoutAdmin = () => signOut(auth).then(() => location.reload());
        window.startRegistration = async () => {
            const result = await signInWithPopup(auth, provider);
            document.getElementById('reg-id').value = document.getElementById('studentID').value;
            document.getElementById('reg-google-email').value = result.user.email;
            document.getElementById('reg-modal').classList.remove('hidden');
        };

        function showAdminPanel() {
            document.getElementById('main-card').classList.replace('max-w-xl', 'max-w-6xl');
            document.getElementById('attendance-view').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
        }
        function hideAdminPanel() {
            document.getElementById('main-card').classList.replace('max-w-6xl', 'max-w-xl');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('attendance-view').classList.remove('hidden');
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <nav class="bg-[#008000] text-white py-6 px-10 shadow-xl flex justify-between items-center border-b-8 border-[#CC0000]">
        <h1 class="font-black text-2xl uppercase italic italic tracking-tighter">NEU Library System</h1>
        <div id="admin-display-name" class="text-xs font-mono"></div>
    </nav>

    <main class="container mx-auto p-4 flex flex-col items-center justify-center mt-10">
        <div id="main-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl border-t-8 border-[#008000] p-10 transition-all duration-500">
            
            <div id="attendance-view" class="text-center space-y-8">
                <div id="welcome-msg" class="hidden py-10"><h2 class="text-6xl font-black text-[#008000] italic uppercase tracking-tighter">Welcome!</h2></div>
                <div id="log-form-container" class="space-y-6">
                    <h2 class="text-4xl font-black text-[#008000] uppercase italic tracking-widest">Time In</h2>
                    <select id="visitReason" class="w-full p-5 bg-slate-50 border-2 rounded-2xl font-bold text-xl">
                        <option>Reading</option><option>Research</option><option>Computer Use</option><option>Assignments</option><option>Books/Borrowing</option>
                    </select>
                    <input type="text" id="studentID" maxlength="12" placeholder="00-00000-000" class="w-full p-8 border-4 border-slate-100 rounded-[2.5rem] text-center text-5xl font-mono uppercase outline-none focus:border-green-500">
                    <button onclick="handleLog()" class="w-full bg-[#008000] text-white font-black py-8 rounded-[2.5rem] text-3xl shadow-xl hover:scale-105 transition-transform">Confirm</button>
                    <div id="profile-not-found" class="hidden p-4 bg-red-50 rounded-2xl border border-red-200 text-red-600 font-bold">
                        No Profile. <button onclick="startRegistration()" class="underline text-red-700">Register with Google</button>
                    </div>
                    <button onclick="loginAdmin()" class="text-[10px] text-slate-300 uppercase mt-4">Admin Login</button>
                </div>
            </div>

            <div id="admin-panel" class="hidden space-y-6">
                <div class="flex justify-between items-center border-b pb-4">
                    <h2 class="text-2xl font-black text-[#008000] uppercase italic">Admin Panel</h2>
                    <div class="flex gap-2">
                        <button onclick="exportToExcel()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Excel</button>
                        <button onclick="logoutAdmin()" class="bg-[#CC0000] text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Logout</button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <input type="date" id="filterDate" onchange="applyFilters()" class="p-2 border rounded-xl font-bold text-xs">
                    <select id="filterCol" onchange="applyFilters()" class="p-2 border rounded-xl font-bold text-[10px]">
                        <option>All Colleges</option>
                        <option>Integrated School (IS)</option><option>College of Informatics and Computing Studies (CICS)</option><option>College of Accountancy (COA)</option>
                    </select>
                    <select id="filterReason" onchange="applyFilters()" class="p-2 border rounded-xl font-bold text-[10px]">
                        <option>All Reasons</option><option>Reading</option><option>Research</option><option>Computer Use</option>
                    </select>
                </div>

                <div class="bg-green-700 text-white p-4 rounded-2xl text-center">
                    <p class="text-[10px] font-black uppercase opacity-70">Total Filtered Logs</p>
                    <h3 id="stat-total" class="text-3xl font-black">0</h3>
                </div>

                <input type="text" id="adminSearch" onkeyup="updateUserTable()" placeholder="Search User List..." class="w-full p-4 border-2 rounded-xl font-bold text-sm outline-none focus:border-green-500">

                <div class="grid lg:grid-cols-2 gap-4">
                    <div class="bg-white border rounded-3xl overflow-hidden h-64 overflow-y-auto">
                        <table class="w-full text-left"><tbody id="user-manage-list"></tbody></table>
                    </div>
                    <div class="bg-white border rounded-3xl overflow-hidden h-64 overflow-y-auto">
                        <table class="w-full text-left"><tbody id="log-history-list"></tbody></table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="hidden fixed inset-0 bg-slate-900/90 flex items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-[3rem] p-10 max-w-lg w-full border-t-8 border-[#CC0000] shadow-2xl">
            <h2 class="text-3xl font-black text-[#008000] mb-8 uppercase italic text-center">Create Profile</h2>
            <div class="space-y-4">
                <input type="text" id="reg-id" readonly class="w-full p-4 bg-slate-100 rounded-2xl font-black text-center border-2 text-xl">
                <input type="text" id="reg-google-email" readonly class="w-full p-2 text-center text-xs text-slate-400">
                <input type="text" id="reg-full-name" placeholder="FULL NAME (LAST, FIRST)" class="w-full p-5 border-2 rounded-2xl font-bold uppercase text-center text-lg outline-none focus:border-green-500">
                <div class="grid grid-cols-2 gap-3">
                    <select id="reg-role" class="p-4 border-2 rounded-2xl font-bold text-sm">
                        <option>Student</option>
                        <option>Teacher</option>
                    </select>
                    <select id="reg-year" class="p-4 border-2 rounded-2xl font-bold text-sm">
                        <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>N/A</option>
                    </select>
                </div>
                <select id="reg-college" class="w-full p-4 border-2 rounded-2xl font-bold text-sm">
                    <option selected disabled>Choice Department</option>
                    <option>Integrated School (IS)</option>
                    <option>College of Accountancy (COA)</option>
                    <option>College of Informatics and Computing Studies (CICS)</option>
                    <option>College of Engineering and Architecture (CEA)</option>
                    <option>College of Arts and Sciences (CAS)</option>
                </select>
                <button onclick="saveNewUser()" class="w-full bg-[#008000] text-white py-6 rounded-[2rem] font-black uppercase text-xl shadow-xl hover:bg-green-700 transition-colors">Register & Finish</button>
            </div>
        </div>
    </div>
</body>
</html>
