<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEU Library System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* FIREBASE CONFIG (DI GINALAW) */
const firebaseConfig = {
apiKey: "AIzaSyBqNGAVvvhMPxwR64_x0aqkCvvnRyNwknI",
authDomain: "student-library-system-3e72c.firebaseapp.com",
databaseURL: "https://student-library-system-3e72c-default-rtdb.firebaseio.com",
projectId: "student-library-system-3e72c",
storageBucket: "student-library-system-3e72c.appspot.com",
messagingSenderId: "80114803910",
appId: "1:80114803910:web:9dd831301ce90972d2a3c7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const ADMIN_EMAILS = ["jcesperanza@neu.edu.ph","jayvanne.pingal@neu.edu.ph"];

window.studentsData = {};
window.logsData = [];

const isValidID = id => /^\d{2}-\d{5}-\d{3}$/.test(id);

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user && ADMIN_EMAILS.includes(user.email)){
document.getElementById("adminPanel").classList.remove("hidden");
}else{
document.getElementById("adminPanel").classList.add("hidden");
}
});

/* DATA */
onValue(ref(db,'students'),snap=>{
window.studentsData = snap.val() || {};
updateTable();
});

onValue(ref(db,'logs'),snap=>{
window.logsData = snap.val()?Object.values(snap.val()):[];
updateStats();
renderChart();
});

/* TIME IN */
async function handleLog(){
const id=document.getElementById("studentID").value.trim();
const reason=document.getElementById("visitReason").value;

if(!isValidID(id)) return alert("Use format: 00-00000-000");

const user=window.studentsData[id];

if(!user){
showMsg("Profile not found. Please Sign-in with Google to Register.");
try{
const res=await signInWithPopup(auth,provider);

/* CHECK DUPLICATE */
const exist=Object.values(window.studentsData)
.find(u=>u.email===res.user.email);

if(exist){ showMsg("Account is already exist"); return; }

document.getElementById("reg-id").value=id;
document.getElementById("reg-email").value=res.user.email;
document.getElementById("regModal").classList.remove("hidden");

}catch(e){ alert("Google login required"); }
return;
}

if(user.blocked) return alert("Blocked ka ng admin");

const now=new Date();

push(ref(db,'logs'),{
id,name:user.name,email:user.email,
college:user.college,year:user.year,
reason,time:now.toLocaleTimeString(),
date:now.toLocaleDateString(),
fullDate:now.toISOString()
});

showMsg("Welcome to Library");
document.getElementById("studentID").value="";
}

/* MESSAGE */
function showMsg(msg){
const box=document.getElementById("msg");
box.innerText=msg;
box.classList.remove("hidden");
setTimeout(()=>box.classList.add("hidden"),3000);
}

/* SIGNUP */
function saveUser(){
const id=document.getElementById("reg-id").value;

set(ref(db,'students/'+id),{
name:document.getElementById("reg-name").value,
email:document.getElementById("reg-email").value,
college:document.getElementById("reg-college").value,
year:document.getElementById("reg-year").value,
blocked:false
}).then(()=>{
document.getElementById("regModal").classList.add("hidden");
handleLog();
});
}

/* ADMIN */
function loginAdmin(){ signInWithPopup(auth,provider); }
function logoutAdmin(){ signOut(auth); }

function toggleBlock(id,status){
update(ref(db,'students/'+id),{blocked:!status});
}

/* STATS */
function updateStats(){
document.getElementById("total").innerText=window.logsData.length;
}

/* TABLE */
function updateTable(){
const list=document.getElementById("table");
list.innerHTML="";
Object.entries(window.studentsData).forEach(([id,data])=>{
list.innerHTML+=`
<tr class="border-b">
<td>${id}</td>
<td>${data.name}</td>
<td>${data.email}</td>
<td>${data.college}</td>
<td>${data.year}</td>
<td>${data.blocked?"BLOCKED":"ACTIVE"}</td>
<td>
<button onclick="toggleBlock('${id}',${data.blocked})"
class="bg-red-500 text-white px-2 rounded">
${data.blocked?"Unblock":"Block"}
</button>
</td>
</tr>`;
});
}

/* CHART */
let chart;
function renderChart(){
const ctx=document.getElementById("chart").getContext("2d");

const counts={};
window.logsData.forEach(l=>{
counts[l.date]=(counts[l.date]||0)+1;
});

const labels=Object.keys(counts);
const data=Object.values(counts);

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'bar',
data:{labels,datasets:[{label:'Visitors',data}]}
});
}

/* EXPORT */
function exportExcel(){
const ws=XLSX.utils.json_to_sheet(window.logsData);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Logs");
XLSX.writeFile(wb,"LibraryLogs.xlsx");
}

/* 🔥 FIX (IMPORTANT) */
window.handleLog = handleLog;
window.saveUser = saveUser;
window.loginAdmin = loginAdmin;
window.logoutAdmin = logoutAdmin;
window.toggleBlock = toggleBlock;
window.exportExcel = exportExcel;

</script>
</head>

<body class="bg-green-100 p-6">

<div class="bg-white p-6 rounded-xl max-w-md mx-auto shadow">
<img src="download.png" class="w-16 mx-auto mb-3">

<div id="msg" class="hidden text-green-600 text-center"></div>

<select id="visitReason" class="w-full p-2 border mb-2">
<option>Reading</option>
<option>Research</option>
<option>Computer</option>
<option>Assignments</option>
<option>Books</option>
</select>

<input id="studentID" placeholder="00-00000-000"
class="w-full p-3 border mb-2 text-center">

<button onclick="handleLog()" class="w-full bg-green-600 text-white p-3">
TIME IN
</button>

<button onclick="loginAdmin()" class="text-sm mt-2">
Admin Login
</button>
</div>

<div id="adminPanel" class="hidden mt-10 max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold">Admin Dashboard</h2>

<p>Total Visitors: <span id="total">0</span></p>

<button onclick="exportExcel()" class="bg-blue-500 text-white px-3 py-1 mt-2">
Export Excel
</button>

<canvas id="chart" class="mt-4"></canvas>

<table class="w-full mt-4 border">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Email</th><th>College</th><th>Year</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<button onclick="logoutAdmin()" class="bg-red-500 text-white p-2 mt-4">
Logout
</button>

</div>

<div id="regModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-6 rounded">

<input id="reg-id" readonly class="border p-2 mb-2 w-full">
<input id="reg-email" readonly class="border p-2 mb-2 w-full">

<input id="reg-name" placeholder="Full Name" class="border p-2 mb-2 w-full">

<select id="reg-college" class="border p-2 mb-2 w-full">
<option>College of Informatics and Computing Studies (CICS)</option>
<option>College of Engineering and Architecture (CEA)</option>
<option>College of Nursing (CON)</option>
<option>College of Arts and Sciences (CAS)</option>
</select>

<select id="reg-year" class="border p-2 mb-2 w-full">
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>

<button onclick="saveUser()" class="bg-green-600 text-white w-full p-2">
Save
</button>

</div>
</div>

</body>
</html>
